<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banquets | Banquet System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../../../public/assets/css/theme.css" rel="stylesheet">
<link href="../../../public/assets/css/app.css"   rel="stylesheet">
<style>
.banquet-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow .2s, transform .2s;
    cursor: pointer;
}
.banquet-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.banquet-card-img {
    height: 140px;
    background: linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    position: relative;
}
.banquet-card-img .status-dot {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid #fff;
}
.banquet-card-body { padding: 16px 18px; }
.banquet-card-name { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.banquet-card-sub  { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.banquet-stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px }
.banquet-stat-val { font-weight: 700; color: var(--text-primary) }
.banquet-card-footer {
    border-top: 1px solid var(--border-color);
    padding: 10px 18px;
    display: flex;
    gap: 8px;
    background: var(--bg-surface-2);
}
.hall-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-surface-2);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11.5px;
    color: var(--text-secondary);
    margin: 2px;
}
/* star rating display */
.stars { color: #F59E0B; letter-spacing: 1px; font-size: 13px }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar"></aside>

<div class="main-content" id="mainContent">
    <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg></button>
        <nav class="breadcrumb-nav">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../dashboard/index.html">Home</a></li>
                <li class="breadcrumb-item active">Banquets</li>
            </ol>
        </nav>
        <div class="topbar-actions">
            <button class="topbar-btn" id="themeToggle"><span id="themeIcon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M20 15.5A8.5 8.5 0 1 1 8.5 4a7 7 0 0 0 11.5 11.5Z"></path></svg></span></button>
            <div class="dropdown">
                <button class="avatar-btn" data-bs-toggle="dropdown"><div class="avatar" data-user-avatar></div></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item danger" href="#" data-action="logout"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M5 20V9.5A1.5 1.5 0 0 1 6.5 8h11A1.5 1.5 0 0 1 19 9.5V20"></path><path d="M9 20v-4h6v4"></path><path d="M12 8v6"></path></svg> Log Out</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="page-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Banquets</h1>
                <p class="page-subtitle">Manage all banquet properties, branches and their halls</p>
            </div>
            <div style="display:flex;gap:10px">
                <button class="btn-ghost" onclick="setView('list')" id="viewList" title="List view"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg></button>
                <button class="btn-ghost" onclick="setView('grid')" id="viewGrid" title="Grid view"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
                <button class="btn-primary-brand" data-require-perm="banquets:create" onclick="openModal()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg> Add Banquet</button>
            </div>
        </div>

        <!-- Stats strip -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px">
            <div class="kpi-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between">
                    <div><div class="kpi-label">Total Banquets</div><div class="kpi-value" id="statTotal">—</div></div>
                    <div class="kpi-icon-wrap" style="background:var(--kpi-1-bg)"><span style="font-size:20px;color:var(--kpi-1)"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M4 8.5 12 3l8 5.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"></path><path d="M9 21v-6h6v6"></path><path d="M9 10h6"></path></svg></span></div>
                </div>
            </div>
            <div class="kpi-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between">
                    <div><div class="kpi-label">Total Halls</div><div class="kpi-value" id="statHalls">—</div></div>
                    <div class="kpi-icon-wrap" style="background:var(--kpi-2-bg)"><span style="font-size:20px;color:var(--kpi-2)"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M5 20V9.5A1.5 1.5 0 0 1 6.5 8h11A1.5 1.5 0 0 1 19 9.5V20"></path><path d="M9 20v-4h6v4"></path><path d="M12 8v6"></path></svg></span></div>
                </div>
            </div>
            <div class="kpi-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between">
                    <div><div class="kpi-label">Total Capacity</div><div class="kpi-value" id="statCapacity">—</div></div>
                    <div class="kpi-icon-wrap" style="background:var(--kpi-3-bg)"><span style="font-size:20px;color:var(--kpi-3)"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="7" r="3"></circle><path d="M17 8a3 3 0 1 1 0 6"></path><path d="M20 19v-1a2 2 0 0 0-1.4-1.9"></path></svg></span></div>
                </div>
            </div>
            <div class="kpi-card">
                <div style="display:flex;align-items:flex-start;justify-content:space-between">
                    <div><div class="kpi-label">Avg Rating</div><div class="kpi-value" id="statRating" style="color:var(--kpi-4)">—</div></div>
                    <div class="kpi-icon-wrap" style="background:var(--kpi-4-bg)"><span style="font-size:20px;color:var(--kpi-4)"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="m12 2 3.2 6.5 7.2.8-5.4 5.1 1.5 7-6.5-3.6-6.5 3.6 1.5-7-5.4-5.1 7.2-.8z"></path></svg></span></div>
                </div>
            </div>
        </div>

        <!-- Search / filter bar -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
            <div class="search-input-wrap" style="flex:1;min-width:200px">
                <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="11" cy="11" r="6"></circle><path d="m20 20-4.2-4.2"></path></svg></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Search banquets, city…" oninput="handleSearch(this.value)">
            </div>
            <select class="form-select" id="branchFilter" onchange="renderBanquets()" style="width:auto">
                <option value="">All Branches</option>
                <option value="1">Main Branch</option>
                <option value="2">North Branch</option>
                <option value="3">South Branch</option>
            </select>
            <select class="form-select" id="statusFilter" onchange="renderBanquets()" style="width:auto">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
            <select class="form-select" id="sortByFilter" onchange="renderBanquets()" style="width:auto">
                <option value="name-asc">Name (A–Z)</option>
                <option value="capacity-desc">Capacity (High–Low)</option>
                <option value="rating-desc">Rating (High–Low)</option>
                <option value="recent-desc">Recently Added</option>
            </select>
        </div>

        <!-- Grid view -->
        <div id="gridView">
            <div id="banquetGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px">
                <div class="text-center py-5" style="grid-column:1/-1"><span class="spinner-border" style="color:var(--brand-primary)"></span></div>
            </div>
        </div>

        <!-- List view -->
        <div id="listView" style="display:none">
            <div class="table-card">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Banquet</th><th>Branch</th><th>City</th><th>Halls</th><th>Capacity</th><th>Rating</th><th>Status</th><th style="width:130px">Actions</th></tr>
                        </thead>
                        <tbody id="banquetList">
                            <tr><td colspan="8" class="text-center py-4"><span class="spinner-border spinner-border-sm"></span></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="paginationWrap"></div>
    </main>
    <footer style="padding:16px 24px;border-top:1px solid var(--border-color);text-align:center;font-size:12px;color:var(--text-muted)">© 2026 BanquetPro</footer>
</div>

<!-- Add / Edit Banquet Modal -->
<div class="modal fade" id="banquetModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Banquet</h5>
                <button class="btn-close" data-bs-dismiss="modal">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="banquetId">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Banquet Name *</label>
                        <input type="text" class="form-control" id="bName" placeholder="Royal Heritage Banquet">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="bStatus">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Branch *</label>
                        <select class="form-select" id="bBranch">
                            <option value="">Select Branch</option>
                            <option value="1">Main Branch</option>
                            <option value="2">North Branch</option>
                            <option value="3">South Branch</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">GST Number</label>
                        <input type="text" class="form-control" id="bGST" placeholder="27AABCB1234K1Z5" maxlength="15">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address *</label>
                        <input type="text" class="form-control" id="bAddress" placeholder="Street, Area">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">City *</label>
                        <input type="text" class="form-control" id="bCity" placeholder="Mumbai">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">State *</label>
                        <select class="form-select" id="bState">
                            <option value="">Select State</option>
                            <option value="Maharashtra" selected>Maharashtra</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Telangana">Telangana</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Pincode</label>
                        <input type="text" class="form-control" id="bPin" placeholder="400001" maxlength="6">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Phone</label>
                        <input type="tel" class="form-control" id="bPhone" placeholder="+91 22 4567 8901">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Email</label>
                        <input type="email" class="form-control" id="bEmail" placeholder="info@banquet.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Total Capacity</label>
                        <input type="number" class="form-control" id="bCapacity" min="0" placeholder="e.g. 1600">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Cover Image URL</label>
                        <input type="text" class="form-control" id="bImageUrl" placeholder="Leave blank to use a placeholder image">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="bDesc" rows="3" placeholder="Briefly describe the banquet property, ambiance, specialties…"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Amenities</label>
                        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:4px">
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Parking" style="margin:0"> Parking</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Wi-Fi" style="margin:0"> Wi-Fi</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="AC" style="margin:0"> AC</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="DJ Setup" style="margin:0"> DJ Setup</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Valet" style="margin:0"> Valet</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Bridal Room" style="margin:0"> Bridal Room</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Catering Kitchen" style="margin:0"> Catering Kitchen</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Generator Backup" style="margin:0"> Generator Backup</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="CCTV" style="margin:0"> CCTV</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Elevator" style="margin:0"> Elevator</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Outdoor Space" style="margin:0"> Outdoor Space</label>
                            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" class="form-check-input amenity-cb" value="Swimming Pool" style="margin:0"> Swimming Pool</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-primary-brand" id="saveBanquetBtn" onclick="saveBanquet()"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M6 3h9l4 4v14H6z"></path><path d="M14 3v5h4"></path><path d="M8 13h8"></path><path d="M8 17h8"></path></svg> Save Banquet</button>
            </div>
        </div>
    </div>
</div>

<!-- Banquet Detail Drawer (quick view) -->
<div id="drawerBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1040" onclick="closeDrawer()"></div>
<div id="detailDrawer" style="display:none;position:fixed;top:0;right:0;height:100%;width:420px;background:var(--bg-surface);border-left:1px solid var(--border-color);z-index:1050;overflow-y:auto;padding:24px;box-shadow:var(--shadow-xl)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h5 style="margin:0;font-size:16px;font-weight:700" id="drawerName">—</h5>
        <button onclick="closeDrawer()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted)">×</button>
    </div>
    <div id="drawerContent"></div>
</div>

<!-- Add Review Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Add Review</h5><button class="btn-close" data-bs-dismiss="modal">×</button></div>
            <div class="modal-body">
                <div style="position:relative">
                    <label class="form-label">Completed Booking *</label>
                    <input type="text" class="form-control" id="revBookingSearch" autocomplete="off" oninput="searchReviewBookings(this.value)" placeholder="Search by booking ref or customer name…">
                    <div id="revBookingSuggest" class="dropdown-menu" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;z-index:1080"></div>
                </div>
                <input type="hidden" id="revBookingId">
                <div id="revBookingInfo" style="display:none;margin-top:8px;padding:8px;background:var(--bg-surface-2);border-radius:8px;font-size:12.5px"></div>
                <div style="margin-top:12px">
                    <label class="form-label">Rating *</label>
                    <select class="form-select" id="revRating">
                        <option value="5">★★★★★ (5)</option>
                        <option value="4">★★★★☆ (4)</option>
                        <option value="3">★★★☆☆ (3)</option>
                        <option value="2">★★☆☆☆ (2)</option>
                        <option value="1">★☆☆☆☆ (1)</option>
                    </select>
                </div>
                <div style="margin-top:12px"><label class="form-label">Title</label><input type="text" class="form-control" id="revTitle" placeholder="e.g. Wonderful experience"></div>
                <div style="margin-top:12px"><label class="form-label">Review</label><textarea class="form-control" id="revText" rows="3" placeholder="What did the customer say about the event?"></textarea></div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-primary-brand" id="saveReviewBtn" onclick="submitReview()">Save Review</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<button id="scrollTop">↑</button>

<script>
Auth.requireAuth('../auth/login.html');

// Consistent stock banquet photos used until a real image_url is set (see Edit Banquet modal).
const PLACEHOLDER_BANQUET_IMAGES = [
    'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=500&auto=format&fit=crop&q=60',
];
const placeholderBanquetImage = id => PLACEHOLDER_BANQUET_IMAGES[(id||0) % PLACEHOLDER_BANQUET_IMAGES.length];

let allBanquets = [];
let currentView = 'grid';

/* Maps the real /banquets response (banquet_name, is_active, avg_rating, etc. — see
   backend/src/repositories/banquet.repository.js BASE_SELECT) onto the field names
   this page's render functions use (name, status, amenities, halls). Written once
   here instead of touching every template literal below. */
function normalizeBanquet(b) {
    return {
        ...b,
        name:        b.banquet_name,
        status:      b.is_active ? 'active' : 'inactive',
        amenities:   b.amenities || [],
        halls:       b.halls || [],
        avg_rating:  parseFloat(b.avg_rating) || 0,
        total_capacity: parseInt(b.total_capacity) || 0,
        total_halls: parseInt(b.total_halls) || 0,
        total_reviews:  parseInt(b.total_reviews) || 0,
        total_bookings: parseInt(b.total_bookings) || 0,
    };
}

/* â”€â”€ Load â”€â”€ */
async function loadBanquets() {
    try {
        const res = await API.banquets.list();
        allBanquets = (res.data?.banquets || []).map(normalizeBanquet);
    } catch (err) {
        Utils.toast(err.message || 'Unable to load banquets from the server', 'error');
        allBanquets = [];
    }
    updateStats(allBanquets);
    renderBanquets();
}

function updateStats(banquets) {
    const totalHalls    = banquets.reduce((s, b) => s + (b.total_halls || 0), 0);
    const totalCapacity = banquets.reduce((s, b) => s + (b.total_capacity || 0), 0);
    const avgRating     = banquets.reduce((s, b) => s + (b.avg_rating || 0), 0) / (banquets.length || 1);
    document.getElementById('statTotal').textContent    = banquets.length;
    document.getElementById('statHalls').textContent    = totalHalls;
    document.getElementById('statCapacity').textContent = Utils.formatNumber(totalCapacity);
    document.getElementById('statRating').innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="m12 2 3.2 6.5 7.2.8-5.4 5.1 1.5 7-6.5-3.6-6.5 3.6 1.5-7-5.4-5.1 7.2-.8z"></path></svg><span>${avgRating.toFixed(1)}</span></span>`;
}

/* â”€â”€ Filter + render â”€â”€ */
function renderBanquets() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const branch = document.getElementById('branchFilter').value;
    const status = document.getElementById('statusFilter').value;

    const filtered = allBanquets.filter(b => {
        if (q      && !`${b.name} ${b.city} ${b.state}`.toLowerCase().includes(q)) return false;
        if (branch && String(b.branch_id) !== branch)                               return false;
        if (status && b.status !== status)                                           return false;
        return true;
    });

    if (currentView === 'grid') renderGrid(filtered);
    else                        renderList(filtered);
}

/* â”€â”€ View toggle â”€â”€ */
function setView(v) {
    currentView = v;
    document.getElementById('gridView').style.display = v === 'grid' ? '' : 'none';
    document.getElementById('listView').style.display = v === 'list' ? '' : 'none';
    document.getElementById('viewGrid').style.fontWeight = v === 'grid' ? '800' : '400';
    document.getElementById('viewList').style.fontWeight = v === 'list' ? '800' : '400';
    renderBanquets();
}

async function loadDrawerReviews(banquetId) {
    const el = document.getElementById('drawerReviews');
    if (!el) return;
    try {
        const res = await API.reviews.forBanquet(banquetId, { limit: 5 });
        const reviews = res.data?.reviews || [];
        if (!reviews.length) { el.innerHTML = 'No reviews yet.'; return; }
        el.innerHTML = reviews.map(r => `
            <div style="padding:8px 0;border-bottom:1px solid var(--border-color)">
                <div style="display:flex;justify-content:space-between">
                    <strong style="color:var(--text-primary)">${r.customer_name}</strong>
                    <span style="color:#F59E0B">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                </div>
                ${r.title ? `<div style="font-weight:600;color:var(--text-primary);margin-top:2px">${r.title}</div>` : ''}
                ${r.review_text ? `<div style="margin-top:2px">${r.review_text}</div>` : ''}
                <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${Utils.formatDate(r.created_at)} · ${r.booking_ref||''}</div>
            </div>`).join('');
    } catch (err) {
        el.textContent = 'Could not load reviews.';
    }
}

/* ── Add Review ── */
let reviewModalInst, reviewBanquetId = null;
function openReviewModal(banquetId) {
    reviewBanquetId = banquetId;
    document.getElementById('revBookingSearch').value = '';
    document.getElementById('revBookingId').value = '';
    document.getElementById('revBookingInfo').style.display = 'none';
    document.getElementById('revRating').value = '5';
    document.getElementById('revTitle').value = '';
    document.getElementById('revText').value = '';
    reviewModalInst = reviewModalInst || new bootstrap.Modal(document.getElementById('reviewModal'));
    reviewModalInst.show();
}

const searchReviewBookings = Utils.debounce(async (q) => {
    const box = document.getElementById('revBookingSuggest');
    if (!q || q.length < 2) { box.style.display = 'none'; return; }
    try {
        const res = await API.bookings.list({ search: q, status: 'completed', limit: 8 });
        const rows = res.data?.bookings || [];
        if (!rows.length) { box.innerHTML = '<span class="dropdown-item-text text-muted">No completed bookings found</span>'; box.style.display = 'block'; return; }
        box.innerHTML = rows.map(b => `<a class="dropdown-item" href="#" onclick="selectReviewBooking(${b.booking_id},'${(b.booking_ref||'').replace(/'/g,"\\'")}','${(b.customer_name||'').replace(/'/g,"\\'")}');return false">
            <strong>${b.booking_ref}</strong> — ${b.customer_name||''}
        </a>`).join('');
        box.style.display = 'block';
    } catch (_) { box.style.display = 'none'; }
}, 300);

function selectReviewBooking(id, ref, customer) {
    document.getElementById('revBookingId').value = id;
    document.getElementById('revBookingSearch').value = ref;
    document.getElementById('revBookingSuggest').style.display = 'none';
    const info = document.getElementById('revBookingInfo');
    info.style.display = '';
    info.innerHTML = `Customer: <strong>${customer||''}</strong>`;
}

async function submitReview() {
    const btn = document.getElementById('saveReviewBtn');
    const bookingId = document.getElementById('revBookingId').value;
    if (!bookingId) { Utils.toast('Please select a completed booking first', 'warning'); return; }
    Utils.showLoader(btn, 'Saving…');
    try {
        await API.reviews.create({
            bookingId: parseInt(bookingId, 10),
            rating: parseInt(document.getElementById('revRating').value, 10),
            title: document.getElementById('revTitle').value.trim() || undefined,
            reviewText: document.getElementById('revText').value.trim() || undefined,
        });
        Utils.hideLoader(btn);
        reviewModalInst.hide();
        Utils.toast('Review recorded', 'success');
        await loadBanquets();
        openDrawer(reviewBanquetId); // re-render the drawer (incl. rating/review-count stat tile) from the refreshed banquet list
    } catch (err) {
        Utils.hideLoader(btn);
        Utils.toast(err.message || 'Failed to save review', 'error');
    }
}

function closeDrawer() {
    document.getElementById('drawerBackdrop').style.display = 'none';
    document.getElementById('detailDrawer').style.display   = 'none';
}

/* â”€â”€ Add / Edit Modal â”€â”€ */
let banquetModalInst, editingId = null;

function openModal(id = null) {
    editingId = id;
    const b   = id ? allBanquets.find(x => x.banquet_id === id) : null;
    document.getElementById('modalTitle').textContent = b ? 'Edit Banquet' : 'Add Banquet';
    document.getElementById('banquetId').value  = b?.banquet_id || '';
    document.getElementById('bName').value      = b?.name        || '';
    document.getElementById('bStatus').value    = b?.status      || 'active';
    document.getElementById('bBranch').value    = b?.branch_id   || '';
    document.getElementById('bGST').value       = b?.gst_number  || '';
    document.getElementById('bAddress').value   = b?.address     || '';
    document.getElementById('bCity').value      = b?.city        || '';
    document.getElementById('bState').value     = b?.state       || '';
    document.getElementById('bPin').value       = b?.pincode     || '';
    document.getElementById('bPhone').value     = b?.phone       || '';
    document.getElementById('bEmail').value     = b?.email       || '';
    document.getElementById('bDesc').value      = b?.description || '';
    document.getElementById('bCapacity').value  = b?.total_capacity || '';
    document.getElementById('bImageUrl').value  = b?.image_url || '';
    document.querySelectorAll('.amenity-cb').forEach(cb => {
        cb.checked = (b?.amenities || []).includes(cb.value);
    });
    banquetModalInst = new bootstrap.Modal(document.getElementById('banquetModal'));
    banquetModalInst.show();
}

async function saveBanquet() {
    const btn  = document.getElementById('saveBanquetBtn');
    const name = document.getElementById('bName').value.trim();
    if (!name) { Utils.toast('Banquet name is required', 'error'); return; }
    const data = {
        name,
        status:      document.getElementById('bStatus').value,
        branch_id:   parseInt(document.getElementById('bBranch').value) || null,
        gst_number:  document.getElementById('bGST').value.trim()    || null,
        address:     document.getElementById('bAddress').value.trim() || null,
        city:        document.getElementById('bCity').value.trim()    || null,
        state:       document.getElementById('bState').value          || null,
        pincode:     document.getElementById('bPin').value.trim()     || null,
        phone:       document.getElementById('bPhone').value.trim()   || null,
        email:       document.getElementById('bEmail').value.trim()   || null,
        description: document.getElementById('bDesc').value.trim()    || null,
        total_capacity: parseInt(document.getElementById('bCapacity').value) || null,
        image_url:   document.getElementById('bImageUrl').value.trim() || null,
        amenities:   [...document.querySelectorAll('.amenity-cb:checked')].map(c => c.value),
    };
    Utils.showLoader(btn, 'Saving…');
    try {
        if (editingId) await API.banquets.update(editingId, data);
        else           await API.banquets.create(data);
        Utils.hideLoader(btn);
        banquetModalInst.hide();
        Utils.toast(editingId ? 'Banquet updated!' : 'Banquet created!', 'success');
        loadBanquets();
    } catch (err) {
        Utils.hideLoader(btn);
        Utils.toast(err.message || 'Failed to save banquet', 'error');
    }
}

async function deleteBanquet(id) {
    const ok = await Utils.confirm('Deactivate this banquet? Its halls and bookings are unaffected, but it will no longer be bookable.', { title: 'Deactivate Banquet', danger: true });
    if (!ok) return;
    try {
        await API.banquets.delete(id);
        Utils.toast('Banquet deactivated', 'success');
        loadBanquets();
    } catch (err) {
        Utils.toast(err.message || 'Failed to deactivate banquet', 'error');
    }
}

const handleSearch = Utils.debounce(() => renderBanquets(), 300);
