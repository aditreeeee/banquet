<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halls | Banquet System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../../../public/assets/css/theme.css" rel="stylesheet">
<link href="../../../public/assets/css/app.css"   rel="stylesheet">
<style>
.hall-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.hall-tile {
    background:var(--bg-surface); border:1px solid var(--border-color);
    border-radius:var(--radius-lg); overflow:hidden;
    transition:box-shadow var(--transition-base), transform var(--transition-base);
    box-shadow:var(--shadow-sm);
    cursor:pointer;
}
.hall-tile:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.hall-tile-img { height:160px; background:linear-gradient(135deg,#4C1D95,#7C3AED); display:flex; align-items:center; justify-content:center; font-size:56px; position:relative; overflow:hidden; }
.hall-tile-img img { width:100%; height:100%; object-fit:cover; display:block; }
.hall-tile-body { padding:16px; }
.hall-tile-name { font-size:16px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
.hall-tile-venue { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
.hall-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.chip { font-size:11px; font-weight:500; padding:3px 8px; border-radius:20px; background:var(--bg-surface-2); color:var(--text-secondary); border:1px solid var(--border-color); }
.hall-tile-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border-color); }
.hall-price-tag { font-size:15px; font-weight:700; color:var(--brand-primary); }
.view-toggle { display:flex; gap:6px; }
.view-btn { width:32px; height:32px; border:1px solid var(--border-color); background:var(--bg-surface); border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all var(--transition-fast); }
.view-btn.active { background:var(--brand-primary); border-color:var(--brand-primary); color:white; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar"></aside>

<div class="main-content" id="mainContent">
    <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg></button>
        <nav class="breadcrumb-nav"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="../dashboard/index.html">Home</a></li><li class="breadcrumb-item active">Halls</li></ol></nav>
        <div class="topbar-actions">
            <button class="topbar-btn" id="themeToggle"><span id="themeIcon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M20 15.5A8.5 8.5 0 1 1 8.5 4a7 7 0 0 0 11.5 11.5Z"></path></svg></span></button>
            <div class="dropdown"><button class="avatar-btn" data-bs-toggle="dropdown"><div class="avatar" data-user-avatar></div></button><ul class="dropdown-menu dropdown-menu-end"><li><a class="dropdown-item danger" href="#" data-action="logout"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M5 20V9.5A1.5 1.5 0 0 1 6.5 8h11A1.5 1.5 0 0 1 19 9.5V20"></path><path d="M9 20v-4h6v4"></path><path d="M12 8v6"></path></svg> Log Out</a></li></ul></div>
        </div>
    </header>

    <main class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Halls</h1><p class="page-subtitle">Manage banquet halls, capacity, pricing and availability</p></div>
            <div style="display:flex;gap:10px;align-items:center">
                <div class="view-toggle">
                    <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid view"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
                    <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="List view"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><line x1="4" y1="7" x2="20" y2="7"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="17" x2="20" y2="17"></line></svg></button>
                </div>
                <button class="btn-primary-brand" onclick="openHallModal()" data-require-perm="halls:create"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg> Add Hall</button>
            </div>
        </div>

        <!-- Filters -->
        <div class="table-card" style="border-radius:var(--radius-lg);overflow:visible;margin-bottom:20px">
            <div style="display:flex;gap:10px;flex-wrap:wrap;padding:14px 16px">
                <div class="search-input-wrap">
                    <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="11" cy="11" r="6"></circle><path d="m20 20-4.2-4.2"></path></svg></span>
                    <input type="text" class="form-control" id="hallSearch" placeholder="Search halls…" oninput="handleSearch(this.value)">
                </div>
                <select class="form-select" id="banquetFilter" onchange="loadHalls()" style="width:auto">
                    <option value="">All Banquets</option>
                </select>
                <select class="form-select" id="typeFilter" onchange="loadHalls()" style="width:auto">
                    <option value="">All Types</option>
                    <option value="main_hall">Main Hall</option>
                    <option value="lawn">Lawn / Outdoor</option>
                    <option value="conference">Conference Room</option>
                    <option value="terrace">Terrace</option>
                </select>
                <select class="form-select" id="capacityFilter" onchange="loadHalls()" style="width:auto">
                    <option value="">Any Capacity</option>
                    <option value="0-100">Up to 100</option>
                    <option value="100-250">100–250</option>
                    <option value="250-500">250–500</option>
                    <option value="500+">500+</option>
                </select>
                <select class="form-select" id="statusFilter" onchange="loadHalls()" style="width:auto">
                    <option value="">All Statuses</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
                <select class="form-select" id="sortBy" onchange="loadHalls()" style="width:auto">
                    <option value="hall_name-ASC">Name (A–Z)</option>
                    <option value="capacity-DESC">Capacity (High–Low)</option>
                    <option value="capacity-ASC">Capacity (Low–High)</option>
                    <option value="base_price-DESC">Price (High–Low)</option>
                    <option value="base_price-ASC">Price (Low–High)</option>
                    <option value="created_at-DESC">Recently Added</option>
                </select>
            </div>
        </div>

        <!-- Hall grid -->
        <div id="hallsContainer">
            <div class="hall-grid" id="hallGrid">
                <div style="grid-column:1/-1;text-align:center;padding:48px"><span class="spinner-border spinner-border-sm me-2"></span>Loading halls…</div>
            </div>
        </div>
        <div id="paginationWrap"></div>
    </main>
    <footer style="padding:16px 24px;border-top:1px solid var(--border-color);text-align:center;font-size:12px;color:var(--text-muted)">© 2026 BanquetPro</footer>
</div>

<!-- Hall Form Modal -->
<div class="modal fade" id="hallModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="hallModalTitle">Add Hall</h5>
                <button class="btn-close" data-bs-dismiss="modal">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="hallId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Hall Name *</label>
                        <input type="text" class="form-control" id="hallName" placeholder="e.g. Royal Ballroom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Banquet *</label>
                        <select class="form-select" id="hallBanquetId">
                            <option value="">— Select banquet —</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hall Code *</label>
                        <input type="text" class="form-control" id="hallCode" placeholder="e.g. RB-001">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Hall Type *</label>
                        <select class="form-select" id="hallType">
                            <option value="main_hall">Main Hall</option>
                            <option value="lawn">Lawn / Outdoor</option>
                            <option value="conference">Conference</option>
                            <option value="terrace">Terrace</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Floor</label>
                        <input type="number" class="form-control" id="hallFloor" min="0" value="1">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Seated Capacity *</label>
                        <input type="number" class="form-control" id="hallCapacitySeated" min="1" placeholder="e.g. 500">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Standing Capacity</label>
                        <input type="number" class="form-control" id="hallCapacityStanding" min="0" placeholder="e.g. 800">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Area (sq ft)</label>
                        <input type="number" class="form-control" id="hallArea" min="0" placeholder="e.g. 6000">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Base Price (₹/day) *</label>
                        <input type="number" class="form-control" id="hallBasePrice" min="0" placeholder="e.g. 150000">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Weekend Multiplier</label>
                        <input type="number" class="form-control" id="hallWeekendMult" min="1" max="3" step="0.05" value="1.25" placeholder="e.g. 1.25">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Amenities</label>
                        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:4px">
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasAC" style="accent-color:var(--brand-primary)"> Air Conditioning</label>
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasStage" style="accent-color:var(--brand-primary)"> Stage</label>
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasKitchen" style="accent-color:var(--brand-primary)"> Kitchen</label>
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasPowerBackup" style="accent-color:var(--brand-primary)"> Power Backup</label>
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasParking" style="accent-color:var(--brand-primary)"> Parking</label>
                            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px"><input type="checkbox" id="hasWashroom" style="accent-color:var(--brand-primary)"> Washrooms</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="hallDescription" rows="3" placeholder="Brief description of the hall…"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Image URL</label>
                        <input type="text" class="form-control" id="hallImageUrl" placeholder="Leave blank to use a placeholder image">
                        <div class="form-text">A default placeholder is shown until a real photo URL is set here.</div>
                        <div style="display:flex;align-items:center;gap:8px;margin-top:12px">
                            <label class="form-label" style="margin:0">Active</label>
                            <div class="form-check form-switch" style="margin:0">
                                <input class="form-check-input" type="checkbox" id="hallActive" checked style="accent-color:var(--brand-primary)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-primary-brand" id="saveHallBtn" onclick="saveHall()">Save Hall</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<button id="scrollTop">↑</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../../public/assets/js/config.js"></script>
<script src="../../../public/assets/js/api.js"></script>
<script src="../../../public/assets/js/utils.js"></script>
<script src="../../../public/assets/js/auth.js"></script>
<script src="../../../public/assets/js/sidebar.js"></script>
<script>Sidebar.render();</script>
<script src="../../../public/assets/js/app.js"></script>
<script>
Auth.requireAuth('../auth/login.html');

// Consistent stock banquet-hall photos used until a real image_url is set per hall (see Edit Hall modal).
const PLACEHOLDER_HALL_IMAGES = [
    'https://images.unsplash.com/photo-1542665952-14513db15293?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1670529776258-aed0041eb4f9?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1666617710768-425d2d9088f8?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1675247488725-22d1b78e75db?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1568530873454-e4103a0b3c71?w=500&auto=format&fit=crop&q=60',
    'https://images.unsplash.com/photo-1523438885200-e635ba2c371e?w=500&auto=format&fit=crop&q=60',
];
const placeholderImageFor = hallId => PLACEHOLDER_HALL_IMAGES[(hallId||0) % PLACEHOLDER_HALL_IMAGES.length];

let viewMode = 'grid';

function setView(mode) {
    viewMode = mode;
    document.getElementById('gridViewBtn').classList.toggle('active', mode === 'grid');
    document.getElementById('listViewBtn').classList.toggle('active', mode === 'list');
    renderHalls(currentHalls);
}

let currentHalls = [];

async function loadHalls() {
    const container = document.getElementById('hallGrid');
    container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px"><span class="spinner-border spinner-border-sm me-2"></span>Loading…</div>';
    try {
        const capRange = document.getElementById('capacityFilter').value;
        let minCapacity, maxCapacity;
        if (capRange === '500+') { minCapacity = 500; }
        else if (capRange) { [minCapacity, maxCapacity] = capRange.split('-'); }
        const [sortBy, sortDir] = document.getElementById('sortBy').value.split('-');

        const res = await API.halls.list({
            search:       document.getElementById('hallSearch').value || undefined,
            banquet_id:   document.getElementById('banquetFilter').value || undefined,
            hall_type:    document.getElementById('typeFilter').value || undefined,
            min_capacity: minCapacity || undefined,
            max_capacity: maxCapacity || undefined,
            is_active:    document.getElementById('statusFilter').value || undefined,
            sort_by:      sortBy || undefined,
            sort_dir:     sortDir || undefined,
        });
        currentHalls = res.data?.halls || [];
        renderHalls(currentHalls);
    } catch (err) {
        Utils.toast(err.message || 'Unable to load halls from the server', 'error');
        currentHalls = [];
        container.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-state-title">Unable to load halls. Please try again.</div></div></div>';
    }
}

function renderHalls(halls) {
    const container = document.getElementById('hallGrid');
    if (!halls.length) {
        container.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M5 20V9.5A1.5 1.5 0 0 1 6.5 8h11A1.5 1.5 0 0 1 19 9.5V20"></path><path d="M9 20v-4h6v4"></path><path d="M12 8v6"></path></svg></div><div class="empty-state-title">No halls found</div></div></div>';
        return;
    }

    if (viewMode === 'grid') {
        container.className = 'hall-grid';
        container.innerHTML = halls.map(h => `
        <div class="hall-tile" data-hall-id="${h.hall_id}">
            <div class="hall-tile-img">
                <img src="${h.image_url || placeholderImageFor(h.hall_id)}" alt="${h.hall_name}" loading="lazy">
                ${ h.is_active ? '' : '<div style="position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center"><span style="color:white;font-weight:700;font-size:14px;background:rgba(239,68,68,.8);padding:4px 12px;border-radius:20px">INACTIVE</span></div>' }
            </div>
            <div class="hall-tile-body">
                <div class="hall-tile-name">${h.hall_name}</div>
                <div class="hall-tile-venue">${h.banquet_name || ''}</div>
                <div class="hall-chips">
                    <span class="chip"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="7" r="3"></circle><path d="M17 8a3 3 0 1 1 0 6"></path><path d="M20 19v-1a2 2 0 0 0-1.4-1.9"></path></svg> ${h.capacity_seated} seated</span>
                    <span class="chip">${Utils.titleCase(h.hall_type)}</span>
                    ${h.has_ac ? '<span class="chip"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg> AC</span>' : ''}
                    ${h.has_stage ? '<span class="chip"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path><path d="M8 13a4 4 0 0 0 8 0"></path><path d="M12 17v4"></path></svg> Stage</span>' : ''}
                    ${h.has_kitchen ? '<span class="chip"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg> Kitchen</span>' : ''}
                </div>
                <div class="hall-tile-footer">
                    <div class="hall-price-tag">${Utils.formatCurrency(h.base_price)}<span style="font-size:11px;font-weight:400;color:var(--text-muted)">/day</span></div>
                    <div style="display:flex;gap:6px">
                        <button class="btn-icon" title="Edit" onclick="openHallModal(${JSON.stringify(h).replace(/"/g,'&quot;')})"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg></button>
                        <a href="../bookings/create.html?hall=${h.hall_id}" class="btn-icon" title="Book"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><rect x="3" y="4" width="18" height="17" rx="2"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 9h18"></path></svg></a>
                        <button class="btn-icon" data-require-perm="halls:update" title="${h.is_active ? 'Deactivate' : 'Activate'}" style="color:${h.is_active ? 'var(--color-danger)' : 'var(--color-success)'}" onclick="toggleHallStatus(${h.hall_id}, ${h.is_active})"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg></button>
                    </div>
                </div>
            </div>
        </div>`).join('');
    } else {
        container.className = '';
        container.innerHTML = `
        <div class="table-responsive">
            <table class="table">
                <thead><tr><th>Hall</th><th>Banquet</th><th>Type</th><th>Seated Cap.</th><th>Base Price</th><th>Weekend</th><th>Amenities</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                ${halls.map(h => `<tr data-hall-id="${h.hall_id}">
                    <td><div style="font-weight:600">${h.hall_name}</div><div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">${h.hall_code}</div></td>
                    <td>${h.banquet_name || '—'}</td>
                    <td>${Utils.titleCase(h.hall_type)}</td>
                    <td>${Utils.formatNumber(h.capacity_seated)}</td>
                    <td style="font-weight:600">${Utils.formatCurrency(h.base_price)}</td>
                    <td>×${h.weekend_multiplier}</td>
                    <td>
                        ${h.has_ac ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg> ' : ''}${h.has_stage ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path><path d="M8 13a4 4 0 0 0 8 0"></path><path d="M12 17v4"></path></svg> ' : ''}${h.has_kitchen ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg> ' : ''}${h.has_parking ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;"><rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M9 17V7h4a3 3 0 0 1 0 6H9"></path></svg>' : ''}
                    </td>
                    <td>${h.is_active ? '<span class="badge-status badge-confirmed">Active</span>' : '<span class="badge-status badge-cancelled">Inactive</span>'}</td>
                    <td><div style="display:flex;gap:4px">
                        <button class="btn-icon" onclick="openHallModal(${JSON.stringify(h).replace(/"/g,'&quot;')})"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg></button>
                        <button class="btn-icon" data-require-perm="halls:update" title="${h.is_active ? 'Deactivate' : 'Activate'}" style="color:${h.is_active ? 'var(--color-danger)' : 'var(--color-success)'}" onclick="toggleHallStatus(${h.hall_id}, ${h.is_active})"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg></button>
                    </div></td>
                </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    }
    Auth.populateUserUI();
}

async function toggleHallStatus(hallId, isActive) {
    const action = isActive ? 'deactivate' : 'activate';
    const ok = await Utils.confirm(
        isActive ? 'Deactivate this hall? It will no longer accept new bookings.' : 'Activate this hall so it can accept bookings again?',
        { title: isActive ? 'Deactivate Hall' : 'Activate Hall', danger: isActive }
    );
    if (!ok) return;
    try {
        await (isActive ? API.halls.deactivate(hallId) : API.halls.activate(hallId));
        Utils.toast(`Hall ${action}d`, isActive ? 'warning' : 'success');
        loadHalls();
    } catch (err) {
        Utils.toast(err.message || `Failed to ${action} hall`, 'error');
    }
}

const handleSearch = Utils.debounce(() => loadHalls(), 350);

let hallModalInstance;
function openHallModal(hall = null) {
    const isEdit = !!hall;
    document.getElementById('hallModalTitle').textContent = isEdit ? 'Edit Hall' : 'Add Hall';
    document.getElementById('hallId').value = hall?.hall_id || '';
    document.getElementById('hallBanquetId').value = hall?.banquet_id || '';
    document.getElementById('hallName').value = hall?.hall_name || '';
    document.getElementById('hallCode').value = hall?.hall_code || '';
    document.getElementById('hallType').value = hall?.hall_type || 'main_hall';
    document.getElementById('hallFloor').value = hall?.floor_number ?? 1;
    document.getElementById('hallCapacitySeated').value  = hall?.capacity_seated || '';
    document.getElementById('hallCapacityStanding').value= hall?.capacity_standing || '';
    document.getElementById('hallArea').value    = hall?.area_sqft || '';
    document.getElementById('hallBasePrice').value = hall?.base_price || '';
    document.getElementById('hallWeekendMult').value = hall?.weekend_multiplier || 1.25;
    document.getElementById('hallDescription').value = hall?.description || '';
    document.getElementById('hallImageUrl').value = hall?.image_url || '';
    document.getElementById('hallActive').checked = hall?.is_active !== 0;
    document.getElementById('hasAC').checked      = !!hall?.has_ac;
    document.getElementById('hasStage').checked   = !!hall?.has_stage;
    document.getElementById('hasKitchen').checked = !!hall?.has_kitchen;
    document.getElementById('hasPowerBackup').checked = !!hall?.has_power_backup;
    document.getElementById('hasParking').checked = !!hall?.has_parking;
    document.getElementById('hasWashroom').checked= !!hall?.has_washroom;
    hallModalInstance = new bootstrap.Modal(document.getElementById('hallModal'));
    hallModalInstance.show();
}

async function saveHall() {
    const btn = document.getElementById('saveHallBtn');
    const hallId = document.getElementById('hallId').value || null;
    const payload = {
        banquet_id:         document.getElementById('hallBanquetId').value,
        hall_name:          document.getElementById('hallName').value.trim(),
        hall_code:          document.getElementById('hallCode').value.trim().toUpperCase(),
        hall_type:          document.getElementById('hallType').value,
        floor_number:       parseInt(document.getElementById('hallFloor').value),
        capacity_seated:    parseInt(document.getElementById('hallCapacitySeated').value),
        capacity_standing:  parseInt(document.getElementById('hallCapacityStanding').value) || null,
        area_sqft:          parseFloat(document.getElementById('hallArea').value) || null,
        base_price:         parseFloat(document.getElementById('hallBasePrice').value),
        weekend_multiplier: parseFloat(document.getElementById('hallWeekendMult').value),
        description:        document.getElementById('hallDescription').value.trim() || null,
        image_url:          document.getElementById('hallImageUrl').value.trim() || null,
        has_ac:             document.getElementById('hasAC').checked ? 1 : 0,
        has_stage:          document.getElementById('hasStage').checked ? 1 : 0,
        has_kitchen:        document.getElementById('hasKitchen').checked ? 1 : 0,
        has_power_backup:   document.getElementById('hasPowerBackup').checked ? 1 : 0,
        has_parking:        document.getElementById('hasParking').checked ? 1 : 0,
        has_washroom:       document.getElementById('hasWashroom').checked ? 1 : 0,
        is_active:          document.getElementById('hallActive').checked ? 1 : 0,
    };

    if (!payload.hall_name || !payload.banquet_id || !payload.capacity_seated || !payload.base_price) {
        Utils.toast('Please fill all required fields', 'error'); return;
    }

    Utils.showLoader(btn, 'Saving…');
    try {
        if (hallId) {
            await API.halls.update(hallId, payload);
        } else {
            await API.halls.upsert(payload);
        }
        Utils.hideLoader(btn);
        hallModalInstance?.hide();
        Utils.toast(`Hall ${hallId ? 'updated' : 'created'} successfully!`, 'success');
        loadHalls();
    } catch (err) {
        Utils.hideLoader(btn);
        Utils.toast(err.message || 'Failed to save hall', 'error');
    }
}

async function loadBanquetOptions() {
    try {
        const res  = await API.banquets.list({ limit: 50 });
        const list = res.data?.banquets || [];
        const sels = [document.getElementById('banquetFilter'), document.getElementById('hallBanquetId')];
        sels.forEach(sel => {
            const extra = sel.options[0];
            sel.innerHTML = '';
            sel.appendChild(extra);
            list.forEach(b => {
                const o = document.createElement('option');
                o.value = b.banquet_id; o.textContent = b.banquet_name;
                sel.appendChild(o);
            });
        });
    } catch (err) {
        Utils.toast(err.message || 'Unable to load banquet options', 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const hallGrid = document.getElementById('hallGrid');
    hallGrid.addEventListener('click', (event) => {
        const tile = event.target.closest('.hall-tile');
        const row = event.target.closest('tr[data-hall-id]');
        const target = tile || row;
        if (!target || event.target.closest('button, a, .btn-icon')) return;
        const hallId = Number(target.dataset.hallId);
        const hall = currentHalls.find(item => item.hall_id === hallId);
        if (hall) openHallModal(hall);
    });
    loadBanquetOptions();
    loadHalls();
});
</script>
</body>
</html>
