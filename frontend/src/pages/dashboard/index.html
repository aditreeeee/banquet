<style>
:root{
  --deep-navy:#1A2B4A;
  --gold:#C5A059;
  --bg-start:
    radial-gradient(ellipse 80% 55% at 15% 0%, rgba(197,160,89,.055) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 95% 100%, rgba(26,43,74,.045) 0%, transparent 65%),
    linear-gradient(145deg, #F5F0E8 0%, #EDE7DA 50%, #E8E2D4 100%);
  --surface:linear-gradient(148deg,rgba(255,255,255,0.72) 0%,rgba(245,240,232,0.65) 100%);
  --surface-strong:rgba(255,255,255,0.90);
  --topbar-bg:linear-gradient(90deg,rgba(255,255,255,0.82) 0%,rgba(245,240,232,0.78) 100%);
  --text-primary:#1A2B4A;
  --text-secondary:#4B5A72;
  --text-muted:#8A9BB0;
  --border-color:rgba(26,43,74,.09);
  --input-bg:rgba(255,255,255,.88);
  --shadow-color:rgba(26,43,74,0.08);
  --shadow-gold:rgba(197,160,89,0.14);
}
body.dark-mode{
  --bg-start:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(197,160,89,.05) 0%, transparent 55%),
    linear-gradient(145deg, #060D18 0%, #0D1929 35%, #111827 100%);
  --surface:linear-gradient(148deg,rgba(13,25,41,0.95) 0%,rgba(8,15,29,0.92) 100%);
  --surface-strong:rgba(13,25,41,0.96);
  --topbar-bg:linear-gradient(90deg,rgba(6,13,24,0.97) 0%,rgba(13,25,41,0.97) 100%);
  --text-primary:#F0EDD8;
  --text-secondary:#B0BEC8;
  --text-muted:#6A7E94;
  --border-color:rgba(197,160,89,.11);
  --input-bg:rgba(13,25,41,.92);
  --shadow-color:rgba(0,0,0,0.38);
  --shadow-gold:rgba(197,160,89,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg-start);background-attachment:fixed;color:var(--text-primary)}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(197,160,89,.28);border-radius:9999px}
::-webkit-scrollbar-thumb:hover{background:rgba(197,160,89,.5)}

/* ── Playfair Display for headings ─────────────────────────── */
#content h1,#content h2,#content h3,.kpi-val { font-family:'Playfair Display',serif; }

/* ── Glass Card ─────────────────────────────────────────────── */
.g-card{
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(200%);
  -webkit-backdrop-filter:blur(20px) saturate(200%);
  border:1px solid rgba(255,255,255,0.62);
  border-radius:18px;
  box-shadow:
    0 8px 32px var(--shadow-color),
    0 2px 8px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.72);
  transition:box-shadow .25s ease,transform .25s ease,border-color .25s ease;
}
.g-card.hoverable:hover{
  box-shadow:
    0 18px 52px var(--shadow-color),
    0 4px 14px rgba(0,0,0,0.06),
    0 0 0 1px rgba(197,160,89,.14),
    inset 0 1px 0 rgba(255,255,255,0.72);
  transform:translateY(-3px);
  border-color:rgba(197,160,89,.22);
}

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar{
  position:fixed;left:0;top:0;height:100vh;z-index:50;
  background:linear-gradient(160deg,#1A2B4A 0%,#0D1929 55%,#060D18 100%);
  box-shadow:4px 0 36px rgba(6,13,24,0.4);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .32s cubic-bezier(.4,0,.2,1),transform .32s cubic-bezier(.4,0,.2,1);
  width:260px;
  isolation:isolate;
}
/* Subtle noise texture overlay */
#sidebar::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}
#sidebar>*{position:relative;z-index:1}
#sidebar.collapsed{width:72px}
#sidebar.mobile-hidden{transform:translateX(-100%);width:260px}

.sb-label{transition:opacity .2s ease,max-width .32s ease;overflow:hidden;white-space:nowrap;max-width:200px}
#sidebar.collapsed .sb-label{opacity:0;max-width:0}
.sb-section{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:rgba(197,160,89,.38);padding:14px 24px 4px;white-space:nowrap;overflow:hidden;
  transition:opacity .2s ease}
#sidebar.collapsed .sb-section{opacity:0}
.sb-item{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:10px;
  margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.52);font-size:13.5px;font-weight:500;
  transition:background .18s ease,color .18s ease;text-decoration:none;white-space:nowrap;position:relative}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
/* Gold active indicator */
.sb-item.active{background:rgba(197,160,89,.14);color:#C5A059}
.sb-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:58%;border-radius:0 3px 3px 0;
  background:linear-gradient(180deg,#D4B478,#C5A059);
  box-shadow:0 0 9px rgba(197,160,89,.65);
}
.sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-group-header{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:10px;
  margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.52);font-size:13.5px;font-weight:500;
  transition:background .18s ease,color .18s ease;user-select:none}
.sb-group-header:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.sb-group-header.has-active{color:#C5A059}
.sb-group-chevron{margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:transform .25s ease;opacity:.55}
.sb-group-header.expanded .sb-group-chevron{transform:rotate(90deg);opacity:1}
#sidebar.collapsed .sb-group-chevron{opacity:0;width:0;margin:0}
/* Collapsed rail is icon-only — .sb-label already zeroes its own width, but
   .sb-item/.sb-group-header still centered their flex content around
   whatever space was left after the gap to a chevron/label that no longer
   has any, so the icon sat left-of-center instead of centered in the 72px
   rail. justify-content:center (plus the chevron's width zeroed above)
   actually centers it now. */
#sidebar.collapsed .sb-item,
#sidebar.collapsed .sb-group-header{justify-content:center;gap:0;padding-left:0;padding-right:0}
.sb-group-children{max-height:0;overflow:hidden;transition:max-height .28s ease}
.sb-group-children.expanded{max-height:400px}
.sb-group-children .sb-item{padding-left:38px;font-size:12.5px}
.sb-group-children .sb-icon{width:16px;height:16px}
#sidebar.collapsed .sb-group-children{display:none}
.sb-footer{margin-top:auto;border-top:1px solid rgba(197,160,89,.1);padding:14px 12px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:rgba(197,160,89,.18);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:#C5A059;flex-shrink:0;border:1.5px solid rgba(197,160,89,.32)}

/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:45;backdrop-filter:blur(3px);display:none}
#overlay.show{display:block}

/* Main */
#main{height:100vh;display:flex;flex-direction:column;overflow:hidden;
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);margin-left:260px}
#main.collapsed{margin-left:72px}
#main.mobile{margin-left:0}

/* ── Topbar ──────────────────────────────────────────────────── */
#topbar{
  flex-shrink:0;height:62px;
  background:var(--topbar-bg);
  backdrop-filter:blur(24px) saturate(200%);
  -webkit-backdrop-filter:blur(24px) saturate(200%);
  border-bottom:1px solid rgba(197,160,89,.11);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.65),
    0 8px 28px var(--shadow-color);
  display:flex;align-items:center;gap:14px;padding:0 24px;position:relative;z-index:30;
}
.tb-btn{width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(26,43,74,.06);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s ease,box-shadow .18s ease;color:var(--text-primary)}
.tb-btn:hover{background:rgba(26,43,74,.11);box-shadow:0 2px 8px rgba(26,43,74,.07)}
.search-box{flex:1;max-width:340px;display:flex;align-items:center;gap:8px;
  background:var(--input-bg);
  border:1.5px solid var(--border-color);border-radius:10px;padding:6px 12px;
  backdrop-filter:blur(8px);
  transition:border-color .18s ease,box-shadow .18s ease}
.search-box:focus-within{border-color:#C5A059;box-shadow:0 0 0 3px rgba(197,160,89,.11)}
.search-box input{border:none;outline:none;font-size:13.5px;color:var(--text-primary);
  background:transparent;width:100%;font-family:'Inter',sans-serif}
.search-box input::placeholder{color:var(--text-muted)}
.notif-dot{position:absolute;top:9px;right:9px;width:7px;height:7px;
  border-radius:50%;background:#C5A059;border:1.5px solid white;
  box-shadow:0 0 6px rgba(197,160,89,.5)}
.user-avatar{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#1A2B4A,#0D1929);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:white;cursor:pointer;border:2px solid rgba(197,160,89,.32);
  box-shadow:0 2px 10px rgba(197,160,89,.14);
  transition:border-color .18s ease,box-shadow .18s ease;flex-shrink:0}
.user-avatar:hover{border-color:#C5A059;box-shadow:0 4px 16px rgba(197,160,89,.28)}

/* ── Filter Pills ────────────────────────────────────────────── */
.fpill{padding:5px 14px;border-radius:9999px;font-size:12.5px;font-weight:500;
  border:1.5px solid var(--border-color);background:var(--surface-strong);color:var(--text-secondary);
  cursor:pointer;transition:all .18s ease;white-space:nowrap}
.fpill:hover{border-color:var(--deep-navy);color:var(--text-primary)}
.fpill.on{background:linear-gradient(135deg,#1A2B4A 0%,#243756 100%);border-color:#1A2B4A;color:white;
  box-shadow:0 2px 10px rgba(26,43,74,.22)}

/* ── KPI ─────────────────────────────────────────────────────── */
.kpi-icon-wrap{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:linear-gradient(148deg,rgba(197,160,89,.18) 0%,rgba(197,160,89,.06) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.kpi-val{font-size:27px;font-weight:700;color:var(--text-primary);line-height:1}
.kpi-label{font-size:12px;color:var(--text-secondary);font-weight:500;margin-top:3px;letter-spacing:.02em}
.kpi-badge{padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
.badge-up{background:rgba(16,185,129,.12);color:#059669}
.badge-dn{background:rgba(239,68,68,.12);color:#dc2626}

/* Status Pill */
.spill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:9999px;font-size:11.5px;font-weight:600}

/* ── Calendar ────────────────────────────────────────────────── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{font-size:12px;font-weight:700;color:var(--text-muted);text-align:center;padding:7px 0}
.cal-day{width:100%;height:52px;border-radius:9px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;font-size:15px;font-weight:600;
  transition:all .15s ease;position:relative;color:var(--text-primary);border:none;background:transparent}
.cal-day:hover{background:rgba(26,43,74,.07)}
.cal-day.today{background:linear-gradient(135deg,#1A2B4A 0%,#243756 100%);color:white}
.cal-day.selected{background:linear-gradient(135deg,#C5A059 0%,#D4B478 100%);color:white;box-shadow:0 4px 12px rgba(197,160,89,.32)}

/* ── Bars ────────────────────────────────────────────────────── */
.occ-bar{flex:1;height:6px;border-radius:3px;background:rgba(26,43,74,.08);overflow:hidden}
.occ-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* ── Table ───────────────────────────────────────────────────── */
.t-row td{padding:11px 14px;border-bottom:1px solid rgba(26,43,74,.06);font-size:13px;color:var(--text-primary)}
.t-row:last-child td{border-bottom:none}
.t-row:hover td{background:rgba(197,160,89,.04);cursor:pointer}
.t-head th{padding:10px 14px;font-size:11.5px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.06em;
  background:linear-gradient(135deg,rgba(26,43,74,.05) 0%,rgba(197,160,89,.025) 100%);
  border-bottom:1px solid rgba(26,43,74,.07)}

.scroll-y{overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-thumb{background:rgba(197,160,89,.2);border-radius:9999px}
#content{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}

/* ── Animations ──────────────────────────────────────────────── */
@keyframes skeletonPulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.skel{background:linear-gradient(90deg,rgba(26,43,74,.07) 25%,rgba(26,43,74,.13) 37%,rgba(26,43,74,.07) 63%);
  background-size:400% 100%;border-radius:8px;animation:skeletonPulse 1.4s ease-in-out infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s cubic-bezier(.25,.46,.45,.94) forwards}
.fu-1{animation-delay:.04s;opacity:0}.fu-2{animation-delay:.08s;opacity:0}
.fu-3{animation-delay:.12s;opacity:0}.fu-4{animation-delay:.16s;opacity:0}
.fu-5{animation-delay:.20s;opacity:0}.fu-6{animation-delay:.24s;opacity:0}

@media(max-width:768px){
  #main{margin-left:0!important}
  .hide-mobile{display:none!important}
  #content{padding:14px;gap:14px}
  .kpi-val{font-size:22px}
  .kpi-icon-wrap{width:38px;height:38px}
  .resp-2{grid-template-columns:1fr!important}
  .resp-4{grid-template-columns:repeat(2,1fr)!important}
}
@media(max-width:480px){
  .resp-4{grid-template-columns:1fr!important}
  #topbar{padding:0 14px;gap:8px}
}
</style>
</head>

/* ── Helpers ─────────────────────────────────────────────────── */
const fmtS = n => n>=10000000?'₹'+(n/10000000).toFixed(1)+'Cr':n>=100000?'₹'+(n/100000).toFixed(1)+'L':n>=1000?'₹'+(n/1000).toFixed(0)+'K':'₹'+n;
const fmtF = n => '₹'+n.toLocaleString('en-IN');
const sC   = s => ({draft:C.slate,tentative:C.amber,confirmed:C.green,advance_paid:C.purple,fully_paid:C.gold,completed:C.teal,cancelled:C.red,archived:'#9ca3af',no_show:'#7c2d12'}[s]||'#6b7280');
const sL   = s => ({draft:'Draft',tentative:'Tentative',confirmed:'Confirmed',advance_paid:'Advance Paid',fully_paid:'Fully Paid',completed:'Completed',cancelled:'Cancelled',archived:'Archived',no_show:'No Show'}[s]||s);
const occC = v => v>=80?C.green:v>=55?C.amber:C.red;
/* Deterministic per-hall colour (distinct from booking-status colour) so the
   calendar can show "which hall" at a glance, not just "what status" —
   same hall name always maps to the same hue across renders/sessions. */
const HALL_PALETTE = [C.blue, C.teal, C.purple, C.amber, C.green, '#EC4899', C.slate, '#8B5CF6'];
const hallColor = name => {
  if (!name) return '#9ca3af';
  let hash = 0;
  for (let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) & 0xffffffff;
  return HALL_PALETTE[Math.abs(hash) % HALL_PALETTE.length];
};
const ini  = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const dL   = d => new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
/* MSSQL TIME columns come back as full datetimes on a 1970-01-01 epoch (or plain 'HH:MM:SS') — extract just the clock time */
const fmtTime = t => {
  if (!t) return '';
  const m = String(t).match(/(\d{2}):(\d{2})/);
  if (!m) return t;
  const h = parseInt(m[1],10), min = m[2];
  const period = h>=12 ? 'PM' : 'AM';
  const h12 = h%12===0 ? 12 : h%12;
  return `${h12}:${min} ${period}`;
};
const timeAgo = iso => {
  const s = Math.max(0, Math.floor((Date.now()-new Date(iso).getTime())/1000));
  if (s<60) return 'just now';
  if (s<3600) return `${Math.floor(s/60)} min ago`;
  if (s<86400) return `${Math.floor(s/3600)} hr ago`;
  return `${Math.floor(s/86400)} day${Math.floor(s/86400)>1?'s':''} ago`;
};
const activityMeta = action => {
  const a = (action||'').toLowerCase();
  if (a.includes('cancel'))                      return {icon:'xcircle',  c:C.amber};
  if (a.includes('payment') || a.includes('paid'))return {icon:'check',   c:C.gold};
  if (a.includes('invoice'))                     return {icon:'receipt', c:C.blue};
  if (a.includes('block') || a.includes('lock'))  return {icon:'lock',    c:C.red};
  if (a.includes('customer'))                    return {icon:'userplus',c:C.purple};
  return {icon:'calendar', c:C.green};
};
const ACTION_LABELS = {
  'booking.created':        'New booking created',
  'booking.updated':        'Booking updated',
  'booking.cloned':         'Booking cloned',
  'booking.cancelled':      'Booking cancelled',
  'booking.status_changed': 'Booking status changed',
  'booking.hold_expired':   'Tentative hold expired',
  'booking.rescheduled':    'Booking rescheduled',
  'lead.stage_changed':     'Lead stage changed',
};
const activityLabel = action => ACTION_LABELS[action] ||
  (action||'Activity').replace(/^[a-z]+\./,'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
/* Maps the /dashboard/kpis bundle (kpi + charts + activity) into the shapes the demo constants use */
const mapDashboardData = data => {
  if (!data) return null;
  const k = data.kpi || {};
  const occRows = data.charts?.occupancy || [];
  const avgOcc = occRows.length
    ? Math.round(occRows.reduce((s,h)=>s+parseFloat(h.occupancy_pct||0),0)/occRows.length)
    : 0;
  const kpi = {
    bookings: parseInt(k.total_bookings)||0,
    revenue:  parseFloat(k.total_revenue)||0,
    pending:  parseFloat(k.pending_amount)||0,
    occ:      avgOcc,
    bd:null, rd:null, pd:null, od:null, // no prior-period comparison from the API yet
    revenueTarget:      parseFloat(k.revenue_target)||0,
    revenueAchievedPct: parseFloat(k.revenue_achieved_pct)||0,
    revenueRemaining:   parseFloat(k.revenue_remaining)||0,
  };
  const rev = (data.charts?.revenue||[]).map(r=>({l:r.label, r:parseFloat(r.revenue)||0, t:parseFloat(r.target)||0}));
  const sts = (data.charts?.status||[]).map(s=>({n:sL(s.status), v:parseInt(s.count)||0, c:sC(s.status)}));
  const activity = (data.activity||[]).map(a=>{
    const meta = activityMeta(a.action);
    const who  = a.entity_type==='booking' ? [a.customer_name, a.hall_name].filter(Boolean).join(' @ ') : '';
    const base = a.description || (a.booking_ref ? `Booking ${a.booking_ref}` : 'Activity');
    const d    = who ? `${base} — ${who}` : base;
    return {
      t: timeAgo(a.created_at), a: activityLabel(a.action), d, icon: meta.icon, c: meta.c,
      bookingId: a.entity_type==='booking' ? a.entity_id : null,
      module: a.entity_type ? Utils.titleCase(a.entity_type) : null,
    };
  });
  return { kpi, rev, sts, activity };
};
const iso  = (y,m,d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const actIcon = k => ({calendar:I.calendar,check:I.checkCircle,receipt:I.receipt,lock:I.lock,userplus:I.userPlus,xcircle:I.xCircle}[k]||I.checkCircle);
let REAL_HALLS = HALLS_D; // replaced with live Halls data once fetched — see DashboardView's halls effect
const hallCapacity = h => (REAL_HALLS.find(x=>x.n===h)||{}).cap || null;
const paymentStatusOf = b => {
  if (b.status==='cancelled') return { label:'Cancelled', color:C.slate };
  if (b.paid>=b.amt && b.amt>0) return { label:'Fully Paid', color:C.green };
  if (b.paid>0) return { label:'Partially Paid', color:C.amber };
  return { label:'Unpaid', color:C.red };
};
/* Single row-mapping used by every booking fetch on this page (period-based
   table/upcoming feed and the calendar's own range fetch) so the shapes
   consumed by the widgets never drift apart. */
const mapBookingRow = b => ({
  id:       b.booking_id??b.id,
  ref:      b.booking_ref||b.ref||b.id,
  customer: b.customer_name||b.customer,
  event:    b.event_name||b.event,
  hall:     b.hall_name||b.hall,
  date:     (b.event_date||b.date||'').substring(0,10),
  endDate:  (b.event_end_date||b.endDate||b.event_date||b.date||'').substring(0,10),
  time:     fmtTime(b.event_time_start||b.start_time||b.time),
  endTime:  fmtTime(b.event_time_end||b.end_time||b.endTime),
  status:   b.booking_status||b.status||'confirmed',
  paymentStatus: b.payment_status||b.paymentStatus||null,
  amt:      parseFloat(b.total_amount||b.amt)||0,
  paid:     parseFloat(b.amount_paid??b.paid)||0,
  guests:   parseInt(b.guest_count??b.guests)||0,
  isPriority: Boolean(b.is_priority??b.isPriority),
  staffCount: parseInt(b.staff_count??b.staffCount)||0,
  setupMinutes:   parseInt(b.setup_minutes??b.setupMinutes)||0,
  cleanupMinutes: parseInt(b.cleanup_minutes??b.cleanupMinutes)||0,
  cooloffMinutes: parseInt(b.cooloff_minutes??b.cooloffMinutes)||0,
});
/* Every calendar day a booking touches — spans multi-day bookings (event_end_date)
   across each date in between, clipped to [rangeStart, rangeEnd]. */
const datesTouchedBy = (b, rangeStart, rangeEnd) => {
  const out = [];
  let d = new Date(Math.max(new Date(b.date+'T00:00:00'), new Date(rangeStart+'T00:00:00')));
  const end = new Date(Math.min(new Date((b.endDate||b.date)+'T00:00:00'), new Date(rangeEnd+'T00:00:00')));
  while (d<=end) { out.push(iso(d.getFullYear(),d.getMonth()+1,d.getDate())); d.setDate(d.getDate()+1); }
  return out;
};
const OCC_FILTERS = [{k:'today',l:'Today'},{k:'next30',l:'Coming 30 Days'},{k:'last30',l:'Last 30 Days'}];
const inOccRange = (dateStr, filterKey, now) => {
  const d = new Date(dateStr+'T00:00:00');
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if (filterKey==='today') return d.getTime()===today.getTime();
  if (filterKey==='next30') { const end=new Date(today); end.setDate(end.getDate()+30); return d>=today && d<=end; }
  const start=new Date(today); start.setDate(start.getDate()-30); return d>=start && d<=today;
};
const countdownOf = (dateStr, now) => {
  const diffMs = new Date(dateStr+'T00:00:00') - new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const days = Math.round(diffMs/86400000);
  if (days < 0) return 'Past';
  if (days === 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  return `In ${days} days`;
};

const Sidebar = ({ collapsed, onCollapse, isMobile, mobileOpen }) => {
  const user = (typeof Auth!=='undefined'?Auth.getUser():null)||{first_name:'',last_name:'',role_slug:null};
  const name = `${user.first_name} ${user.last_name}`.trim() || '—';
  const canSee = (perm) => !perm || (typeof Auth==='undefined') || Auth.hasPermission(perm);
  const [expandedMap, setExpandedMap] = useState(loadSidebarExpanded);

  // #sidebar.collapsed .sb-group-children{display:none} forces the children
  // hidden regardless of the expanded state while collapsed — toggling
  // expandedMap there was a silent no-op with no flyout to fall back on, so
  // a multi-item group's icon did nothing while collapsed (same bug fixed
  // in sidebar.js's toggleGroup for every other page). Navigate to the
  // group's first visible item instead when collapsed.
  const toggleGroup = (groupName, defaultOpen, firstItemHref) => {
    if (collapsed && !isMobile && firstItemHref) {
      window.location.href = firstItemHref;
      return;
    }
    setExpandedMap(prev => {
      const current = prev[groupName] ?? defaultOpen;
      const next = { ...prev, [groupName]: !current };
      saveSidebarExpanded(next);
      return next;
    });
  };

  return (
    <aside id="sidebar" className={[collapsed&&!isMobile?'collapsed':'',isMobile&&!mobileOpen?'mobile-hidden':''].filter(Boolean).join(' ')}>

              borderRadius:6,cursor:'pointer',color:'rgba(255,255,255,.6)',display:'flex',

      <nav style={{flex:1,overflowY:'auto',overflowX:'hidden',paddingBottom:8}}>
        {NAV.map(sec=>{
          const visibleItems = sec.items.filter(it => canSee(it.perm));
          if (!visibleItems.length) return null;
          const hasActive = visibleItems.some(it => isActiveNavHref(it.href));
          const isExpanded = expandedMap[sec.s] ?? hasActive;
          // A single-item group (e.g. Settings) is just one destination —
          // a flat link reads better than a 1-item accordion the user has
          // to expand first to reach the only thing inside it.
          if (visibleItems.length === 1) {
            const item = visibleItems[0];
            return (
              <a key={sec.s} href={item.href} className={`sb-item ${isActiveNavHref(item.href)?'active':''}`} title={collapsed?sec.s:undefined}>
                <span className="sb-icon">{item.icon()}</span>
                <span className="sb-label">{sec.s}</span>
              </a>
            );
          }
          return (
            <div key={sec.s} className="nav-group">
              <div className={`sb-group-header ${isExpanded?'expanded':''} ${hasActive?'has-active':''}`}
                onClick={() => toggleGroup(sec.s, hasActive, visibleItems[0].href)} title={collapsed?sec.s:undefined}>
                <span className="sb-icon">{visibleItems[0].icon()}</span>
                <span className="sb-label">{sec.s}</span>
                <span className="sb-group-chevron">{I.chevronRight({width:14,height:14})}</span>
              </div>
              <div className={`sb-group-children ${isExpanded?'expanded':''}`}>
                {visibleItems.map(item=>(
                  <a key={item.id} href={item.href} className={`sb-item ${isActiveNavHref(item.href)?'active':''}`} title={collapsed?item.label:undefined}>
                    <span className="sb-icon">{item.icon()}</span>
                    <span className="sb-label">{item.label}</span>
                  </a>
                ))}
              </div>
            </div>
          );
        })}
      </nav>
      {/* Footer */}
      <div className="sb-footer">
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="sb-avatar">{ini(name)}</div>
          <div className="sb-label" style={{minWidth:0,flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:'white',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
            <div style={{fontSize:11,color:C.gold,marginTop:1,textTransform:'capitalize'}}>{(user.role_slug||'').replace(/_/g,' ')}</div>
          </div>
        </div>
      </div>
    </aside>
  );
};

/* Booking Calendar — fetches directly from the live Bookings API (same
   source of truth as bookings/index.html, Command Center, Occupancy Reports)
   for whatever month is currently visible, instead of relying on the
   dashboard's period-limited feed. Re-fetches on month/year navigation and
   whenever another module reports a booking change. */
const MiniCalendar = ({ selected, onSelect, onOpenBooking }) => {
  const [cur, setCur] = useState(new Date(todayDate.getFullYear(), todayDate.getMonth(), 1));
  const [monthBookings, setMonthBookings] = useState([]);
  const [loading, setLoading] = useState(false);
  const [hoverDate, setHoverDate] = useState(null);
  const [hoverPos, setHoverPos] = useState({left:0,top:0});
  const gridWrapRef = React.useRef(null);
  const y=cur.getFullYear(), m=cur.getMonth();
  const dim=new Date(y,m+1,0).getDate(), fdow=new Date(y,m,1).getDay();
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const ds=d=>iso(y,m+1,d);
  const cells=[];
  for(let i=0;i<fdow;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const rangeStart = iso(y,m+1,1);
  const rangeEnd   = iso(y,m+1,dim);

  const fetchMonth = useCallback(() => {
    let dead = false;
    (async () => {
      setLoading(true);
      try {
        if (typeof API === 'undefined') return;
        const res = await API.bookings.list({ from_date: rangeStart, to_date: rangeEnd, limit: 500 }).catch(() => null);
        const raw = Array.isArray(res?.data?.bookings) ? res.data.bookings : (Array.isArray(res?.data) ? res.data : []);
        if (!dead) setMonthBookings(raw.map(mapBookingRow));
      } finally {
        if (!dead) setLoading(false);
      }
    })();
    return () => { dead = true; };
  }, [rangeStart, rangeEnd]);

  useEffect(() => fetchMonth(), [fetchMonth]);

  // Cross-module live sync: bookings/index.html and bookings/detail.html
  // broadcast on create/edit/cancel/clone/delete (see notifyBookingsChanged
  // in api.js) so the calendar reflects changes without a page reload.
  useEffect(() => {
    if (typeof API === 'undefined' || !API.onBookingsChanged) return;
    return API.onBookingsChanged(fetchMonth);
  }, [fetchMonth]);

  // Spans multi-day bookings (setup/cleanup/cooloff live on the same day as
  // the event, only event_end_date extends the booking across calendar days)
  // across every date they touch within the visible month.
  const eventsByDate = useMemo(() => {
    const map = {};
    monthBookings.forEach(b => {
      if (!b.date) return;
      datesTouchedBy(b, rangeStart, rangeEnd).forEach(s => {
        (map[s] = map[s] || []).push(b);
      });
    });
    return map;
  }, [monthBookings, rangeStart, rangeEnd]);

  const handleEnter = (e, s) => {
    if (!eventsByDate[s]?.length) return;
    const cellRect = e.currentTarget.getBoundingClientRect();
    const POPOVER_W = 320, POPOVER_MAX_H = 380, MARGIN = 10;
    let left = Math.max(MARGIN, Math.min(cellRect.left, window.innerWidth - POPOVER_W - MARGIN));
    // Flip above the cell when there isn't room below, so it never runs off
    // the bottom of the viewport (this can render far outside the KPI card).
    const spaceBelow = window.innerHeight - cellRect.bottom;
    const top = spaceBelow >= POPOVER_MAX_H + MARGIN || spaceBelow >= cellRect.top
      ? cellRect.bottom + 6
      : Math.max(MARGIN, cellRect.top - POPOVER_MAX_H - 6);
    setHoverPos({ left, top });
    setHoverDate(s);
  };

  const goToday = () => setCur(new Date(todayDate.getFullYear(), todayDate.getMonth(), 1));

  return (
    <div style={{position:'relative'}} ref={gridWrapRef}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,gap:4}}>
        <div style={{display:'flex',alignItems:'center',gap:2}}>
          <button onClick={()=>setCur(new Date(y-1,m,1))} className="tb-btn" title="Previous year" style={{width:26,height:26,borderRadius:7,fontSize:11,fontWeight:700}}>«</button>
          <button onClick={()=>setCur(new Date(y,m-1,1))} className="tb-btn" title="Previous month" style={{width:26,height:26,borderRadius:7}}>{I.chevronLeft()}</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <span style={{fontWeight:700,fontSize:16,color:C.navy}}>{MON[m]} {y}</span>
          <button onClick={goToday} className="tb-btn" title="Jump to today" style={{fontSize:11.5,fontWeight:700,padding:'4px 10px',borderRadius:999,color:C.gold}}>Today</button>
          {loading && <span style={{width:11,height:11,border:'2px solid rgba(197,160,89,.35)',borderTopColor:C.gold,borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:2}}>
          <button onClick={()=>setCur(new Date(y,m+1,1))} className="tb-btn" title="Next month" style={{width:26,height:26,borderRadius:7}}>{I.chevronRight()}</button>
          <button onClick={()=>setCur(new Date(y+1,m,1))} className="tb-btn" title="Next year" style={{width:26,height:26,borderRadius:7,fontSize:11,fontWeight:700}}>»</button>
        </div>
      </div>
      <div className="cal-grid">{DAYS.map(d=><div key={d} className="cal-hdr">{d}</div>)}</div>
      <div className="cal-grid">
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const s=ds(d), isT=s===TODAY, isSel=s===selected;
          const dayEvents = eventsByDate[s]||[];
          const statusSet = [...new Set(dayEvents.map(b=>b.status))].slice(0,3);
          const hallSet = [...new Set(dayEvents.map(b=>b.hall).filter(Boolean))].slice(0,4);
          const hasEvents = dayEvents.length>0;
          // Aggregate occupancy for the day — average of guests/hall-capacity
          // across every hall booked that day, using the live Halls data
          // already loaded for the Hall Occupancy widget (hallCapacity()).
          const occPcts = dayEvents.map(b=>{
            const cap = hallCapacity(b.hall);
            return cap ? Math.min(100,(b.guests/cap)*100) : null;
          }).filter(v=>v!=null);
          const dayOccPct = occPcts.length ? Math.round(occPcts.reduce((s,v)=>s+v,0)/occPcts.length) : null;
          return (
            <button key={i} className={`cal-day${isT&&!isSel?' today':''}${isSel?' selected':''}`}
              style={hasEvents && !isT && !isSel ? {background:`${sC(statusSet[0])}12`,border:`1px solid ${sC(statusSet[0])}30`} : undefined}
              onClick={()=>dayEvents.length===1 ? onOpenBooking(dayEvents[0].id) : onSelect(isSel?null:s)}
              onMouseEnter={(e)=>handleEnter(e,s)}
              onMouseLeave={()=>setHoverDate(null)}>
              {/* Hall colour coding — one tick per distinct hall booked that day (max 3, kept small so the date stays the focal point) */}
              {hallSet.length>0 && (
                <span style={{position:'absolute',top:3,left:4,display:'flex',gap:2}}>
                  {hallSet.slice(0,3).map(h=>(
                    <span key={h} title={h} style={{width:4,height:8,borderRadius:1,background:hallColor(h)}}/>
                  ))}
                </span>
              )}
              {dayEvents.length>1 && (
                <span style={{position:'absolute',top:3,right:4,fontSize:10,fontWeight:800,lineHeight:1,
                  color:isT||isSel?'white':sC(statusSet[0])}}>{dayEvents.length}</span>
              )}
              {d}
              {/* Occupancy indicator — thin fill bar along the cell's bottom edge */}
              {dayOccPct!=null && (
                <span style={{position:'absolute',bottom:2,left:5,right:5,height:2.5,borderRadius:1,background:'rgba(0,0,0,.08)'}} title={`${dayOccPct}% occupancy`}>
                  <span style={{display:'block',width:`${dayOccPct}%`,height:'100%',borderRadius:1,background:isT||isSel?'white':occC(dayOccPct)}}/>
                </span>
              )}
            </button>
          );
        })}
      </div>
      {hoverDate && eventsByDate[hoverDate]?.length>0 && (
        <DayPopover events={eventsByDate[hoverDate]} style={hoverPos}
          onEnter={()=>setHoverDate(hoverDate)} onLeave={()=>setHoverDate(null)}
          onOpenBooking={onOpenBooking}/>
      )}
      {selected&&(
        <button onClick={()=>onSelect(null)}
          style={{marginTop:10,width:'100%',padding:'6px',borderRadius:8,
            background:'rgba(197,160,89,.1)',border:'1px solid rgba(197,160,89,.3)',
            color:C.gold,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',
            alignItems:'center',justifyContent:'center',gap:6}}>
          Clear date filter
          {I.xCircle()}
        </button>
      )}
    </div>
  );
};

const UpcomingList = ({ bookings, selected, onOpenBooking, now }) => {
  // "Upcoming" always means soonest-first regardless of whatever sort the
  // Bookings Table (which shares this same filtered list) currently has
  // selected — and excludes anything already in the past, which the shared
  // list doesn't filter out on its own.
  const list = useMemo(() => {
    const base = selected ? bookings.filter(b=>b.date===selected) : bookings.filter(b=>!b.date || b.date>=TODAY);
    return [...base].sort((a,b) => new Date(a.date) - new Date(b.date));
  }, [bookings, selected]);
  // Fills the card's remaining height (the card is a flex column — see the
  // Upcoming Bookings <Card> above) instead of a fixed maxHeight that left
  // blank space below a short list whenever the neighboring card was taller.
  return (
    <div className="scroll-y" style={{flex:1,minHeight:0}}>

        <div style={{textAlign:'center',padding:'32px 0',color:'#9ca3af',fontSize:13}}>

      {list.map(b=>{
        const pay = paymentStatusOf(b);
        return (
        <a key={b.id} href={`../bookings/detail.html?id=${b.id}`}
          onClick={(e)=>{e.preventDefault(); onOpenBooking?.(b.id);}}
          style={{display:'flex',gap:10,alignItems:'flex-start',padding:'8px 2px',
            borderBottom:'1px solid rgba(229,231,235,.5)',textDecoration:'none'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:sC(b.status),flexShrink:0,marginTop:5}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
              <span style={{fontWeight:700,fontSize:12.5,color:C.navy,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.event}</span>
              {b.isPriority && (
                <span className="spill" style={{background:`${C.gold}20`,color:C.gold,fontSize:9.5,padding:'1px 7px',flexShrink:0}}>★ VIP</span>

            </div>
            <div style={{fontSize:11,color:'#6b7280',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.customer} · {b.hall}</div>
            <div style={{fontSize:10.5,color:'#9ca3af',marginTop:1}}>{dL(b.date)} · {b.time}{b.endTime?` – ${b.endTime}`:''}{b.guests?` · ${b.guests} guests`:''}</div>
            <div style={{display:'flex',gap:5,marginTop:4,flexWrap:'wrap'}}>
              <span className="spill" style={{background:`${sC(b.status)}18`,color:sC(b.status),fontSize:9.5}}>{sL(b.status)}</span>
              <span className="spill" style={{background:`${pay.color}18`,color:pay.color,fontSize:9.5}}>{pay.label}</span>
              {now && <span className="spill" style={{background:'rgba(61,84,127,.08)',color:C.navy,fontSize:9.5}}>{countdownOf(b.date, now)}</span>}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontWeight:700,fontSize:12.5,color:C.navy}}>{fmtS(b.amt)}</div>
          </div>
        </a>
        );
      })}
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════
   DASHBOARD VIEW
   ════════════════════════════════════════════════════════════════ */
const DashboardView = ({ period, searchQuery }) => {
  const [selDate, setSelDate] = useState(null);
  const [bookings, setBookings] = useState(BOOKINGS_D);
  const [statusFilter, setStatusFilter] = useState('all');
  const [hallFilter, setHallFilter] = useState('all');
  const [sortBy, setSortBy] = useState('date_desc');
  const [now, setNow] = useState(() => new Date());
  const [liveData, setLiveData] = useState(null);
  const [halls, setHalls] = useState(HALLS_D);
  const [isLoading, setIsLoading] = useState(true);
  const kpi = liveData?.kpi || KPI_D[period];
  const rev = liveData?.rev || REV_D[period];
  const sts = liveData?.sts || STS_D[period];
  const activityItems = liveData?.activity || ACTIVITY_D;
  const firstName = (typeof Auth!=='undefined'?Auth.getUser():null)?.first_name || 'there';

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  // Single coordinated fetch for every widget on this page — all requests fire
  // in parallel and the page flips out of the loading/skeleton state only once
  // every source has settled, so KPI cards/charts/calendar/table never flash
  // fabricated zero values while individual requests are still in flight.
  const loadAll = useCallback(() => {
    let dead = false;
    (async () => {
      setIsLoading(true);
      try {
        if (typeof API === 'undefined') return;
        const guard = (promise) => promise.catch(() => null);
        const [kpisRes, hallsRes, bookingsRes] = await Promise.all([
          guard(API.dashboard.kpis({ period })),
          guard(API.halls.list({ limit: 100, is_active: true })),
          guard(API.get(`/dashboard/bookings?period=${period}`)),
        ]);
        if (dead) return;

        const mapped = mapDashboardData(kpisRes?.data);
        setLiveData(mapped || null);

        const hallRows = hallsRes?.data?.halls || [];
        if (hallRows.length) {
          const mappedHalls = hallRows.map(h => ({ n: h.hall_name, cap: h.capacity_seated || h.capacity || 0 }));
          setHalls(mappedHalls);
          REAL_HALLS = mappedHalls;
        }

        const raw = Array.isArray(bookingsRes?.data) ? bookingsRes.data : (Array.isArray(bookingsRes?.data?.bookings) ? bookingsRes.data.bookings : []);
        if (raw.length) {
          setBookings(raw.map(mapBookingRow));
        }
      } finally {
        if (!dead) setIsLoading(false);
      }
    })();
    return () => { dead = true; };
  }, [period]);

  useEffect(() => loadAll(), [loadAll]);

  // Refresh KPIs/table/upcoming list whenever a booking is created, edited,
  // cancelled, cloned, or deleted anywhere else in the app (bookings module,
  // Command Center, etc.) — see notifyBookingsChanged in api.js.
  useEffect(() => {
    if (typeof API === 'undefined' || !API.onBookingsChanged) return;
    return API.onBookingsChanged(loadAll);
  }, [loadAll]);

  const ViewAllLink = ({href}) => (
    <a href={href} style={{fontSize:12,color:C.gold,fontWeight:600,textDecoration:'none',display:'flex',alignItems:'center',gap:3}}>
      View all {I.arrowRight()}
    </a>
  );

  const openBookingDetail = id => {
    if(!id) return;
    window.location.assign(`../bookings/detail.html?id=${id}`);
  };

  const filteredBookings = useMemo(() => {
    const q = (searchQuery||'').trim().toLowerCase();
    return [...bookings]
      .filter(b => {
        const matchesDate = !selDate || b.date === selDate;
        const matchesStatus = statusFilter === 'all' || b.status === statusFilter;
        const matchesHall = hallFilter === 'all' || b.hall === hallFilter;
        const haystack = `${b.customer} ${b.event} ${b.hall} ${b.ref||b.id} ${sL(b.status)}`.toLowerCase();
        const matchesQuery = !q || haystack.includes(q);
        return matchesDate && matchesStatus && matchesHall && matchesQuery;
      })
      .sort((a, b) => {
        switch (sortBy) {
          case 'date_asc': return new Date(a.date) - new Date(b.date);
          case 'amount_asc': return a.amt - b.amt;
          case 'amount_desc': return b.amt - a.amt;
          case 'customer': return a.customer.localeCompare(b.customer);
          default: return new Date(b.date) - new Date(a.date);
        }
      });
  }, [bookings, selDate, searchQuery, statusFilter, hallFilter, sortBy]);

  const visibleBookings = filteredBookings.slice(0, 6);
  const hallOptions = useMemo(() => ['all', ...new Set(bookings.map(b => b.hall).filter(Boolean))], [bookings]);

  const [occFilter, setOccFilter] = useState('next30');
  const hallStats = useMemo(() => {
    const days = occFilter==='today' ? 1 : 30;
    const rangeBookings = bookings.filter(b => b.date && b.status!=='cancelled' && inOccRange(b.date, occFilter, now));
    return halls.map(h => {
      const hb = rangeBookings.filter(b=>b.hall===h.n);
      const bookedDays = new Set(hb.map(b=>b.date)).size;
      return { n:h.n, cap:h.cap, occ: Math.min(100, Math.round((bookedDays/days)*100)), bk: hb.length, rev: hb.reduce((s,b)=>s+b.amt,0) };
    });
  }, [bookings, occFilter, now, halls]);
  const hallStatsTotals = useMemo(() => ({
    slots: hallStats.reduce((s,h)=>s+h.bk,0),
    revenue: hallStats.reduce((s,h)=>s+h.rev,0),
    avgOcc: hallStats.length ? Math.round(hallStats.reduce((s,h)=>s+h.occ,0)/hallStats.length) : 0,
  }), [hallStats]);

  const isSuperAdmin = typeof Auth!=='undefined' && Auth.isSuperAdmin && Auth.isSuperAdmin();
  const impersonationState = typeof API!=='undefined' && API.Impersonation ? API.Impersonation.get() : null;
  const isImpersonating = !!impersonationState;

  return (
    <>
      {isImpersonating && <ImpersonationBanner state={impersonationState}/>}
      {/* Super Admin, no tenant selected — every widget on this page (KPIs,
          charts, Booking Calendar, Command Center) already aggregates every
          tenant (see resolveCompanyScope in utils/branchScope.js). Just a
          confirmation so it's not ambiguous — impersonate a tenant (Platform
          → Tenants) to drill into one company's numbers instead. */}
      {isSuperAdmin && !isImpersonating && (
        <div className="fu fu-1" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
          background:'rgba(124,58,237,.08)',border:'1px solid rgba(124,58,237,.25)',borderRadius:10,marginBottom:4}}>
          <span style={{fontSize:12.5,color:C.navy}}>
            Showing data across every tenant. To view one company's numbers instead, impersonate it from{' '}
            <a href="../platform/tenants.html" style={{color:'#7C3AED',fontWeight:700,textDecoration:'none'}}>Platform → Tenants</a>.
          </span>
        </div>
      )}
      {/* Greeting */}
      <div className="fu fu-1" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:C.navy,lineHeight:1.15,fontFamily:"'Playfair Display', serif"}}>Hello, {firstName}</h1>
          <p style={{fontSize:12.5,color:'#9ca3af',marginTop:2}}>
            {now.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit',hour12:true})}, {now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
          </p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <a href="../bookings/index.html">
            <button style={{padding:'8px 16px',background:C.gold,border:'none',borderRadius:9999,color:'white',
              fontWeight:600,fontSize:13,cursor:'pointer',boxShadow:`0 2px 10px ${C.gold}50`,
              display:'flex',alignItems:'center',gap:6}}>
              {I.plus()}New Booking
            </button>
          </a>
          <button onClick={()=>window.print()}
            style={{padding:'8px 14px',background:'rgba(61,84,127,.08)',border:'1.5px solid rgba(61,84,127,.15)',
              borderRadius:9999,color:C.navy,fontWeight:600,fontSize:13,cursor:'pointer',
              display:'flex',alignItems:'center',gap:6}}>
            {I.download()}Export
          </button>
        </div>
      </div>

      {/* KPI row */}
      <div className="resp-4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        <KPICard IconEl={()=>I.calendar({width:22,height:22})}   label="Total Bookings"   value={kpi.bookings.toLocaleString()} delta={kpi.bd} color={C.purple} anim="fu-1" href="../bookings/index.html" loading={isLoading}
          blurb="Number of bookings created in the selected period."
          desc="Count of all bookings created in the selected period, excluding cancelled and draft holds. % change is vs. the previous equivalent period."/>
        <KPICard IconEl={()=>I.dollarSign()}                       label="Revenue"          value={fmtS(kpi.revenue)}             delta={kpi.rd} color={C.green}  anim="fu-2" href="../reports/revenue.html" loading={isLoading}
          blurb="Total amount collected from bookings this period."
          desc="Sum of amount_paid across all non-cancelled bookings in the selected period. % change is vs. the previous equivalent period."/>
        <KPICard IconEl={()=>I.clock()}                            label="Pending Payments" value={fmtS(kpi.pending)}             delta={kpi.pd} color={C.amber}  anim="fu-3" href="../payments/index.html" loading={isLoading}
          blurb="Outstanding balance still owed across confirmed bookings."
          desc="Sum of (total_amount − amount_paid) across confirmed bookings with an outstanding balance."/>
        <KPICard IconEl={()=>I.building({width:22,height:22})}    label="Hall Occupancy"    value={kpi.occ+'%'}                   delta={kpi.od} color={C.blue}   anim="fu-4" href="../reports/occupancy.html" loading={isLoading}
          blurb="Percentage of total hall capacity utilized during the selected period."
          desc="Average of (booked hall-days ÷ available hall-days) across all active halls in the selected period."/>
      </div>

      {/* Charts */}
      <div className="resp-2 fu fu-3" style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:12,alignItems:'start'}}>
        <Card hover style={{padding:'12px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div>
              <h3 style={{fontSize:13,fontWeight:700,color:C.navy}}>Revenue vs Target</h3>
              <p style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{fmtS(kpi.revenue)} collected this period</p>
            </div>
            {kpi.rd!=null && (
              <span style={{fontSize:10.5,fontWeight:600,padding:'3px 10px',borderRadius:9999,
                background:`${kpi.rd>=0?C.green:C.red}15`,color:kpi.rd>=0?C.green:C.red}}>
                {kpi.rd>=0?'▲':'▼'} {Math.abs(kpi.rd)}% vs prev
              </span>
            )}
          </div>
          {kpi.revenueTarget>0 ? (
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,padding:'7px 10px',background:'rgba(61,84,127,.04)',borderRadius:10}}>
              <div>
                <div style={{fontSize:10,color:'#9ca3af'}}>Target</div>
                <div style={{fontSize:12.5,fontWeight:700,color:C.navy}}>{fmtS(kpi.revenueTarget)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#9ca3af'}}>Achieved</div>
                <div style={{fontSize:12.5,fontWeight:700,color:kpi.revenueAchievedPct>=100?C.green:C.navy}}>{kpi.revenueAchievedPct}%</div>
              </div>
              <div>
                <div style={{fontSize:10,color:'#9ca3af'}}>Remaining</div>
                <div style={{fontSize:12.5,fontWeight:700,color:C.amber}}>{fmtS(kpi.revenueRemaining)}</div>
              </div>
              <div style={{flex:1,height:6,background:'rgba(61,84,127,.1)',borderRadius:9999,overflow:'hidden'}}>
                <div style={{width:`${Math.min(100,kpi.revenueAchievedPct)}%`,height:'100%',background:kpi.revenueAchievedPct>=100?C.green:C.gold,borderRadius:9999}}/>
              </div>
            </div>
          ) : (
            <div style={{fontSize:11,color:'#9ca3af',marginBottom:8}}>
              No revenue target set — <a href="../settings/index.html" style={{color:C.gold}}>configure one in Settings</a>.
            </div>
          )}
          {isLoading ? <Skeleton height={200}/> : <RevenueChart data={rev}/>}
        </Card>
        <Card hover style={{padding:'12px 16px'}}>
          <h3 style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:6}}>Booking Status</h3>
          {isLoading ? <Skeleton height={200} radius="50%" style={{maxWidth:200,margin:'0 auto',aspectRatio:'1'}}/> : <StatusDonut data={sts}/>}
        </Card>
      </div>

      {/* Calendar + Upcoming */}
      <div className="resp-2 fu fu-4" style={{display:'grid',gridTemplateColumns:'3fr 2fr',gap:12}}>
        <Card hover style={{padding:'12px 16px',height:460,display:'flex',flexDirection:'column'}}>
          <h3 style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:8,display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {I.calendarDays({width:16,height:16})}
            Booking Calendar
            {selDate&&<span style={{fontWeight:500,fontSize:12,color:C.gold}}>· {dL(selDate)}</span>}
          </h3>
          <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
            {isLoading ? <Skeleton height="100%"/> : <MiniCalendar selected={selDate} onSelect={setSelDate} onOpenBooking={openBookingDetail}/>}
          </div>
        </Card>
        <Card hover style={{padding:'12px 16px',display:'flex',flexDirection:'column',height:460}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexShrink:0}}>
            <h3 style={{fontSize:13,fontWeight:700,color:C.navy,display:'flex',alignItems:'center',gap:8}}>
              Upcoming Bookings
              <span style={{background:'rgba(61,84,127,.1)',color:C.navy,padding:'2px 8px',borderRadius:9999,fontSize:11,fontWeight:600}}>
                {filteredBookings.length}
              </span>
            </h3>
            <ViewAllLink href="../bookings/index.html"/>
          </div>
          {isLoading ? (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[1,2,3,4].map(i => <Skeleton key={i} height={48}/>)}
            </div>
          ) : (
            <UpcomingList bookings={filteredBookings} selected={selDate} onOpenBooking={openBookingDetail} now={now}/>
          )}
        </Card>
      </div>

      {/* Occupancy + Activity */}
      <div className="resp-2 fu fu-5" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <Card hover style={{padding:'12px 16px',height:380,display:'flex',flexDirection:'column'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,flexWrap:'wrap',gap:8,flexShrink:0}}>
            <h3 style={{fontSize:13,fontWeight:700,color:C.navy,display:'flex',alignItems:'center',gap:8}}>
              {I.building({width:16,height:16})} Hall Occupancy
            </h3>
            <ViewAllLink href="../reports/occupancy.html"/>
          </div>
          <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',flexShrink:0}}>
            {OCC_FILTERS.map(f=>(
              <button key={f.k} className={`fpill${occFilter===f.k?' on':''}`} style={{padding:'3px 10px',fontSize:11}} onClick={()=>setOccFilter(f.k)}>{f.l}</button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:8,flexShrink:0}}>
            <div style={{textAlign:'center',padding:'6px 4px',background:'rgba(37,99,235,.06)',borderRadius:10}}>
              <div style={{fontSize:14,fontWeight:700,color:C.blue}}>{hallStatsTotals.avgOcc}%</div>
              <div style={{fontSize:9.5,color:'#9ca3af'}}>Avg Occupancy</div>
            </div>
            <div style={{textAlign:'center',padding:'6px 4px',background:'rgba(197,160,89,.08)',borderRadius:10}}>
              <div style={{fontSize:14,fontWeight:700,color:C.gold}}>{hallStatsTotals.slots}</div>
              <div style={{fontSize:9.5,color:'#9ca3af'}}>Occupied Slots</div>
            </div>
            <div style={{textAlign:'center',padding:'6px 4px',background:'rgba(16,185,129,.08)',borderRadius:10}}>
              <div style={{fontSize:14,fontWeight:700,color:C.green}}>{fmtS(hallStatsTotals.revenue)}</div>
              <div style={{fontSize:9.5,color:'#9ca3af'}}>Revenue</div>
            </div>
          </div>
          <div style={{flex:1,minHeight:0,overflow:'hidden'}}>
            {isLoading ? (
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {[1,2,3].map(i => <Skeleton key={i} height={28}/>)}
              </div>
            ) : <OccupancyBars halls={hallStats}/>}
          </div>
          <div style={{marginTop:8,display:'flex',gap:12,flexWrap:'wrap',flexShrink:0}}>
            {[{c:C.green,l:'High ≥80%'},{c:C.amber,l:'Mid ≥55%'},{c:C.red,l:'Low <55%'}].map(x=>(
              <span key={x.l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#6b7280'}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:x.c,display:'inline-block'}}/>
                {x.l}
              </span>
            ))}
          </div>
        </Card>
        <Card hover style={{padding:'12px 16px',display:'flex',flexDirection:'column',height:380}}>
          <h3 style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:6,flexShrink:0}}>Recent Activity</h3>
          {isLoading ? (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[1,2,3,4].map(i => <Skeleton key={i} height={32}/>)}
            </div>
          ) : <ActivityFeed items={activityItems}/>}
        </Card>
      </div>

      {/* Bookings table */}
      <Card hover style={{overflow:'hidden'}} className="fu fu-6">
        <div style={{padding:'14px 20px',borderBottom:'1px solid rgba(229,231,235,.6)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <h3 style={{fontSize:14,fontWeight:700,color:C.navy}}>Recent Bookings</h3>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:12,color:'#6b7280'}}>Showing {filteredBookings.length} result{filteredBookings.length===1?'':'s'}</span>
            <select className="fpill" value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:'5px 10px'}}>
              <option value="date_desc">Newest first</option>
              <option value="date_asc">Oldest first</option>
              <option value="amount_desc">Amount: High to Low</option>
              <option value="amount_asc">Amount: Low to High</option>
              <option value="customer">Customer A–Z</option>
            </select>
            <select className="fpill" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{padding:'5px 10px'}}>
              <option value="all">All statuses</option>
              <option value="confirmed">Confirmed</option>
              <option value="advance_paid">Advance Paid</option>
              <option value="fully_paid">Fully Paid</option>
              <option value="cancelled">Cancelled</option>
              <option value="pending">Pending</option>
            </select>
            <select className="fpill" value={hallFilter} onChange={e=>setHallFilter(e.target.value)} style={{padding:'5px 10px'}}>
              {hallOptions.map(h=> <option key={h} value={h}>{h === 'all' ? 'All halls' : h}</option>)}
            </select>
            <button className="fpill" onClick={()=>{setStatusFilter('all');setHallFilter('all');setSortBy('date_desc');setSelDate(null);}} style={{padding:'5px 10px'}}>Clear filters</button>
          </div>
          <ViewAllLink href="../bookings/index.html"/>
        </div>
        {isLoading ? (
          <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:10}}>
            {[1,2,3,4,5].map(i => <Skeleton key={i} height={36}/>)}
          </div>
        ) : (
          <BookingsTable bookings={visibleBookings} onOpenBooking={openBookingDetail}/>
        )}
      </Card>

      <footer style={{textAlign:'center',fontSize:12,color:'#9ca3af',padding:'16px 0',marginTop:8,borderTop:'1px solid rgba(61,84,127,.08)'}}>
        © {new Date().getFullYear()} BanquetPro — Enterprise Banquet Hall Management
      </footer>
    </>
  );
};

/* ════════════════════════════════════════════════════════════════
   APP ROOT
   ════════════════════════════════════════════════════════════════ */
const App = () => {
  const [period,      setPeriod]      = useState('month');
  const [collapsed,   setCollapsed]   = useState(false);
  const [isMobile,    setIsMobile]    = useState(()=>window.innerWidth<768);
  const [mobOpen,     setMobOpen]     = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [darkMode,    setDarkMode]    = useState(() => {
    try { return localStorage.getItem('dashboard-dark-mode') === '1'; } catch { return false; }
  });
  const [notifications, setNotifications] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('dashboard-notifications') || 'null');
      return Array.isArray(saved) && saved.length ? saved : DEMO_NOTIFS;
    } catch {
      return DEMO_NOTIFS;
    }
  });
  const [notifOpen, setNotifOpen] = useState(false);

  useEffect(()=>{
    if(typeof Auth!=='undefined'){ Auth.requireAuth(); Auth.applyTheme?.(); }
  },[]);

  useEffect(()=>{
    document.body.classList.toggle('dark-mode', darkMode);
    document.body.style.colorScheme = darkMode ? 'dark' : 'light';
    try { localStorage.setItem('dashboard-dark-mode', darkMode ? '1' : '0'); } catch (_) {}
  }, [darkMode]);

  useEffect(()=>{
    (async()=>{
      try {
        if (typeof API !== 'undefined' && API.notifications?.list) {
          const res = await API.notifications.list();
          const apiNotifs = Array.isArray(res?.data?.notifications) ? res.data.notifications : [];
          if (apiNotifs.length) {
            const normalized = apiNotifs.map((n, i) => ({ id: n.notification_id || n.id || i + 1, title: n.title || 'Notification', body: n.body || n.message || 'You have a new update', created_at: n.created_at || n.createdAt || new Date().toISOString(), is_read: Boolean(n.is_read ?? n.read ?? false), type: n.notification_type || n.type || 'system' }));
            setNotifications(normalized);
            try { localStorage.setItem('dashboard-notifications', JSON.stringify(normalized)); } catch (_) {}
            return;
          }
        }
      } catch (_) {}
      try {
        const saved = JSON.parse(localStorage.getItem('dashboard-notifications') || 'null');
        if (Array.isArray(saved) && saved.length) setNotifications(saved);
      } catch (_) {}
    })();
  }, []);

  useEffect(()=>{
    try { localStorage.setItem('dashboard-notifications', JSON.stringify(notifications)); } catch (_) {}
  }, [notifications]);

  useEffect(()=>{
    const h=()=>{ const mob=window.innerWidth<768; setIsMobile(mob); if(!mob) setMobOpen(false); };
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  useEffect(()=>{
    const sb=document.getElementById('sidebar');
    const main=document.getElementById('main');
    const ov=document.getElementById('overlay');
    if(!sb||!main||!ov) return;
    if(isMobile){
      sb.className=mobOpen?'':'mobile-hidden';
      main.className='mobile';
      ov.className=mobOpen?'show':'';
    } else {
      sb.className=collapsed?'collapsed':'';
      main.className=collapsed?'collapsed':'';
      ov.className='';
    }
    const ms=document.getElementById('mob-period');
    if(ms) ms.style.display=isMobile?'block':'none';
  },[collapsed,isMobile,mobOpen]);

  window.__closeSidebar=()=>setMobOpen(false);

  function onMenu(){ isMobile?setMobOpen(o=>!o):setCollapsed(c=>!c); }
  const unreadCount = notifications.filter(n=>!n.is_read).length;
  const markNotificationRead = id => setNotifications(list => list.map(n => n.id === id ? { ...n, is_read: true } : n));
  const markAllNotificationsRead = () => { setNotifications(list => list.map(n => ({ ...n, is_read: true }))); setNotifOpen(false); };

  return (
    <>
      <Sidebar collapsed={collapsed} onCollapse={()=>setCollapsed(c=>!c)} isMobile={isMobile} mobileOpen={mobOpen}/>
      <div id="main">
        <Topbar onMenu={onMenu} period={period} setPeriod={setPeriod} searchQuery={searchQuery} setSearchQuery={setSearchQuery} darkMode={darkMode} setDarkMode={setDarkMode} notifications={notifications} unreadCount={unreadCount} notifOpen={notifOpen} setNotifOpen={setNotifOpen} onMarkNotificationRead={markNotificationRead} onMarkAllNotificationsRead={markAllNotificationsRead}/>
        <div id="content"><DashboardView period={period} searchQuery={searchQuery}/></div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
