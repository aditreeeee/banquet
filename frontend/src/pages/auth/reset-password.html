<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Banquet System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../../../public/assets/css/theme.css" rel="stylesheet">
<link href="../../../public/assets/css/app.css"   rel="stylesheet">
<style>
body { background:var(--bg-body); display:flex; align-items:center; justify-content:center; min-height:100vh; }
.auth-box { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-xl); padding:40px; width:100%; max-width:430px; box-shadow:var(--shadow-lg); }
.icon-circle { width:64px; height:64px; background:var(--brand-primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px; }
.auth-title { font-size:24px; font-weight:700; text-align:center; color:var(--text-primary); margin-bottom:8px; }
.auth-sub   { text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:28px; }
.btn-auth   { width:100%; padding:12px; background:var(--brand-primary); color:white; border:none; border-radius:var(--radius-md); font-size:15px; font-weight:600; cursor:pointer; }
.btn-auth:hover { background:var(--brand-primary-hover); }
.pw-wrap { position:relative; }
.pw-wrap .pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:16px; }
.strength-bar { height:4px; background:var(--border-color); border-radius:2px; margin-top:6px; overflow:hidden; }
.strength-fill { height:100%; border-radius:2px; transition:width .3s,background .3s; }
.strength-text { font-size:11px; margin-top:4px; }
.alert-box { padding:12px 16px; border-radius:var(--radius-md); font-size:13px; margin-bottom:20px; border:1px solid; display:none; }
.alert-box.error   { background:var(--color-danger-bg);  border-color:var(--color-danger);  color:var(--color-danger); }
.alert-box.success { background:var(--color-success-bg); border-color:var(--color-success); color:var(--color-success); }
</style>
</head>
<body>
<div class="auth-box">
    <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="8" cy="15" r="3"></circle><path d="M11 12h8"></path><path d="M16 9l3 3"></path></svg></div>
    <div class="auth-title">Set New Password</div>
    <div class="auth-sub">Create a strong password for your account.</div>
    <div class="alert-box" id="alert"></div>

    <form id="resetForm" novalidate>
        <input type="hidden" id="token">
        <div class="form-group mb-3">
            <label class="form-label">New Password</label>
            <div class="pw-wrap">
                <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required autocomplete="new-password">
                <button type="button" class="pw-toggle" data-target="password"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0"></div></div>
            <div class="strength-text" id="strengthText"></div>
            <div class="invalid-feedback" id="password_error"></div>
            <div class="form-text">Use 8+ characters with uppercase, lowercase, number, and symbol.</div>
        </div>
        <div class="form-group mb-4">
            <label class="form-label">Confirm Password</label>
            <div class="pw-wrap">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password">
                <button type="button" class="pw-toggle" data-target="confirmPassword"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
            </div>
            <div class="invalid-feedback" id="confirmPassword_error"></div>
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">Update Password</button>
    </form>
    <div style="text-align:center;margin-top:16px">
        <a href="login.html" style="color:var(--text-muted);font-size:13px;text-decoration:none">← Back to login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../../public/assets/js/config.js"></script>
<script src="../../../public/assets/js/api.js"></script>
<script src="../../../public/assets/js/utils.js"></script>
<script src="../../../public/assets/js/auth.js"></script>
<script>
Auth.applyTheme();

// Extract token from URL
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
    document.getElementById('alert').textContent = 'Invalid or missing reset token. Please request a new link.';
    document.getElementById('alert').className = 'alert-box error';
    document.getElementById('alert').style.display = '';
    document.getElementById('resetForm').style.display = 'none';
}
document.getElementById('token').value = token || '';

// Password toggles
document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', function() {
        const input = document.getElementById(this.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
        this.textContent = input.type === 'password' ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><path d="M2 12s3-6 10-6 10 6 10 6-3 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="3"></circle></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg>';
    });
});

// Strength meter
document.getElementById('password').addEventListener('input', function() {
    const v   = this.value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (v.length >= 8)          score++;
    if (/[A-Z]/.test(v))        score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const levels = [
        { pct: 0,   color: 'transparent', label: '' },
        { pct: 25,  color: 'var(--color-danger)',  label: 'Weak' },
        { pct: 50,  color: 'var(--color-warning)', label: 'Fair' },
        { pct: 75,  color: 'var(--color-info)',    label: 'Good' },
        { pct: 100, color: 'var(--color-success)', label: 'Strong' },
    ];
    const lvl = levels[score];
    fill.style.width      = lvl.pct + '%';
    fill.style.background = lvl.color;
    text.textContent      = lvl.label;
    text.style.color      = lvl.color;
});

document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');
    const alertEl  = document.getElementById('alert');

    Utils.clearAllErrors(this);
    alertEl.style.display = 'none';
    let valid = true;

    if (!Utils.Validators.password(password)) {
        Utils.setFieldError('password', 'Password must be 8+ characters with upper, lower, number and symbol');
        valid = false;
    }
    if (password !== confirm) {
        Utils.setFieldError('confirmPassword', 'Passwords do not match');
        valid = false;
    }
    if (!valid) return;

    Utils.showLoader(btn, 'Updating…');
    try {
        await API.auth.resetPassword(token, password);
        alertEl.textContent = 'Password updated! Redirecting to login…';
        alertEl.className   = 'alert-box success';
        alertEl.style.display = '';
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } catch (err) {
        Utils.hideLoader(btn);
        alertEl.textContent = err.message || 'Reset failed. The link may have expired.';
        alertEl.className   = 'alert-box error';
        alertEl.style.display = '';
    }
});
</script>
</body>
</html>
