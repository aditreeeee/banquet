<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Banquet System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="../../../public/assets/css/theme.css" rel="stylesheet">
<link href="../../../public/assets/css/app.css"   rel="stylesheet">
<style>
body { background:var(--bg-body); display:flex; align-items:center; justify-content:center; min-height:100vh; }
.auth-box {
    background: var(--bg-surface); border:1px solid var(--border-color);
    border-radius: var(--radius-xl); padding:40px; width:100%; max-width:430px;
    box-shadow: var(--shadow-lg);
}
.back-link { color:var(--text-muted); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:6px; margin-bottom:24px; }
.back-link:hover { color:var(--brand-primary); }
.icon-circle { width:64px; height:64px; background:var(--brand-primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 20px; }
.auth-title { font-size:24px; font-weight:700; text-align:center; color:var(--text-primary); margin-bottom:8px; }
.auth-sub { text-align:center; color:var(--text-muted); font-size:14px; margin-bottom:28px; }
.btn-auth { width:100%; padding:12px; background:var(--brand-primary); color:white; border:none; border-radius:var(--radius-md); font-size:15px; font-weight:600; cursor:pointer; transition:background var(--transition-fast); }
.btn-auth:hover { background:var(--brand-primary-hover); }
.alert-box { padding:12px 16px; border-radius:var(--radius-md); font-size:13px; margin-bottom:20px; border:1px solid; display:none; }
.alert-box.error   { background:var(--color-danger-bg);  border-color:var(--color-danger);  color:var(--color-danger); }
.alert-box.success { background:var(--color-success-bg); border-color:var(--color-success); color:var(--color-success); }
.success-state { text-align:center; display:none; }
.success-state .icon { font-size:56px; margin-bottom:16px; }
</style>
</head>
<body>
<div class="auth-box">
    <a href="login.html" class="back-link">← Back to login</a>

    <!-- Request form -->
    <div id="requestView">
        <div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg></div>
        <div class="auth-title">Forgot Password?</div>
        <div class="auth-sub">Enter your email and we'll send a password reset link.</div>
        <div class="alert-box" id="alert"></div>
        <form id="forgotForm" novalidate>
            <div class="form-group mb-4">
                <label class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="you@company.com" required>
                <div class="invalid-feedback" id="email_error"></div>
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">Send Reset Link</button>
        </form>
    </div>

    <!-- Success state -->
    <div class="success-state" id="successView">
        <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:inline-block;vertical-align:middle;"><circle cx="12" cy="12" r="8"></circle></svg></div>
        <div class="auth-title">Check your email</div>
        <div class="auth-sub" style="margin-bottom:28px">
            We've sent a password reset link to <strong id="sentEmail"></strong>.
            The link expires in 15 minutes.
        </div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">
            Didn't receive it? Check your spam folder or
            <button class="demo-cred-btn" style="background:none;border:none;color:var(--brand-primary);cursor:pointer;font-size:13px;text-decoration:underline" onclick="resend()">resend the email</button>.
        </p>
        <a href="login.html" class="btn-auth" style="display:flex;align-items:center;justify-content:center;text-decoration:none">Back to Login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../../public/assets/js/config.js"></script>
<script src="../../../public/assets/js/api.js"></script>
<script src="../../../public/assets/js/utils.js"></script>
<script src="../../../public/assets/js/auth.js"></script>
<script>
Auth.applyTheme();

let lastEmail = '';

document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submitBtn');

    alert.style.display = 'none';
    Utils.clearAllErrors(this);

    if (!email || !Utils.Validators.email(email)) {
        Utils.setFieldError('email', 'Please enter a valid email address');
        return;
    }

    Utils.showLoader(btn, 'Sending…');
    try {
        await API.auth.forgotPassword(email);
        lastEmail = email;
        document.getElementById('sentEmail').textContent = email;
        document.getElementById('requestView').style.display = 'none';
        document.getElementById('successView').style.display = '';
    } catch (err) {
        Utils.hideLoader(btn);
        // Always show success (security: don't reveal if email exists)
        lastEmail = email;
        document.getElementById('sentEmail').textContent = email;
        document.getElementById('requestView').style.display = 'none';
        document.getElementById('successView').style.display = '';
    }
});

async function resend() {
    if (lastEmail) {
        try { await API.auth.forgotPassword(lastEmail); } catch(_) {}
        Utils.toast('Reset email resent!', 'success');
    }
}
</script>
</body>
</html>
