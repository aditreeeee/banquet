<style>
:root{
  --deep-navy:#1A2B4A;
  --gold:#C5A059;
  --bg-start:
    radial-gradient(ellipse 80% 55% at 15% 0%, rgba(197,160,89,.055) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 95% 100%, rgba(26,43,74,.045) 0%, transparent 65%),
    linear-gradient(145deg, #F5F0E8 0%, #EDE7DA 50%, #E8E2D4 100%);
  --surface:linear-gradient(148deg,rgba(255,255,255,0.72) 0%,rgba(245,240,232,0.65) 100%);
  --surface-strong:rgba(255,255,255,0.90);
  --topbar-bg:linear-gradient(90deg,rgba(255,255,255,0.82) 0%,rgba(245,240,232,0.78) 100%);
  --text-primary:#1A2B4A;
  --text-secondary:#4B5A72;
  --text-muted:#8A9BB0;
  --border-color:rgba(26,43,74,.09);
  --input-bg:rgba(255,255,255,.88);
  --shadow-color:rgba(26,43,74,0.08);
  --shadow-gold:rgba(197,160,89,0.14);
}
body.dark-mode{
  --bg-start:
    radial-gradient(ellipse 70% 50% at 10% 0%, rgba(197,160,89,.05) 0%, transparent 55%),
    linear-gradient(145deg, #060D18 0%, #0D1929 35%, #111827 100%);
  --surface:linear-gradient(148deg,rgba(13,25,41,0.95) 0%,rgba(8,15,29,0.92) 100%);
  --surface-strong:rgba(13,25,41,0.96);
  --topbar-bg:linear-gradient(90deg,rgba(6,13,24,0.97) 0%,rgba(13,25,41,0.97) 100%);
  --text-primary:#F0EDD8;
  --text-secondary:#B0BEC8;
  --text-muted:#6A7E94;
  --border-color:rgba(197,160,89,.11);
  --input-bg:rgba(13,25,41,.92);
  --shadow-color:rgba(0,0,0,0.38);
  --shadow-gold:rgba(197,160,89,0.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg-start);background-attachment:fixed;color:var(--text-primary)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(197,160,89,.28);border-radius:9999px}
::-webkit-scrollbar-thumb:hover{background:rgba(197,160,89,.5)}
#content h1,#content h2,#content h3,.kpi-val { font-family:'Playfair Display',serif; }
.g-card{
  background:var(--surface);
  backdrop-filter:blur(20px) saturate(200%);
  -webkit-backdrop-filter:blur(20px) saturate(200%);
  border:1px solid rgba(255,255,255,0.62);
  border-radius:18px;
  box-shadow:0 8px 32px var(--shadow-color),0 2px 8px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.72);
  transition:box-shadow .25s ease,transform .25s ease,border-color .25s ease;
}
.g-card.hoverable:hover{
  box-shadow:0 18px 52px var(--shadow-color),0 4px 14px rgba(0,0,0,0.06),0 0 0 1px rgba(197,160,89,.14),inset 0 1px 0 rgba(255,255,255,0.72);
  transform:translateY(-3px);
  border-color:rgba(197,160,89,.22);
}
#sidebar{
  position:fixed;left:0;top:0;height:100vh;z-index:50;
  background:linear-gradient(160deg,#1A2B4A 0%,#0D1929 55%,#060D18 100%);
  box-shadow:4px 0 36px rgba(6,13,24,0.4);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .32s cubic-bezier(.4,0,.2,1),transform .32s cubic-bezier(.4,0,.2,1);
  width:260px;isolation:isolate;
}
#sidebar::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}
#sidebar>*{position:relative;z-index:1}
#sidebar.collapsed{width:72px}
#sidebar.mobile-hidden{transform:translateX(-100%);width:260px}
.sb-label{transition:opacity .2s ease,max-width .32s ease;overflow:hidden;white-space:nowrap;max-width:200px}
#sidebar.collapsed .sb-label{opacity:0;max-width:0}
.sb-section{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:rgba(197,160,89,.38);padding:14px 24px 4px;white-space:nowrap;overflow:hidden;transition:opacity .2s ease}
#sidebar.collapsed .sb-section{opacity:0}
.sb-item{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:10px;
  margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.52);font-size:13.5px;font-weight:500;
  transition:background .18s ease,color .18s ease;text-decoration:none;white-space:nowrap;position:relative}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.sb-item.active{background:rgba(197,160,89,.14);color:#C5A059}
.sb-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:58%;border-radius:0 3px 3px 0;
  background:linear-gradient(180deg,#D4B478,#C5A059);box-shadow:0 0 9px rgba(197,160,89,.65);
}
.sb-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sb-group-header{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:10px;
  margin:1px 8px;cursor:pointer;color:rgba(255,255,255,.52);font-size:13.5px;font-weight:500;
  transition:background .18s ease,color .18s ease;user-select:none}
.sb-group-header:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.sb-group-header.has-active{color:#C5A059}
.sb-group-chevron{margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:transform .25s ease;opacity:.55}
.sb-group-header.expanded .sb-group-chevron{transform:rotate(90deg);opacity:1}
#sidebar.collapsed .sb-group-chevron{opacity:0}
.sb-group-children{max-height:0;overflow:hidden;transition:max-height .28s ease}
.sb-group-children.expanded{max-height:400px}
.sb-group-children .sb-item{padding-left:38px;font-size:12.5px}
.sb-group-children .sb-icon{width:16px;height:16px}
#sidebar.collapsed .sb-group-children{display:none}
.sb-footer{margin-top:auto;border-top:1px solid rgba(197,160,89,.1);padding:14px 12px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:rgba(197,160,89,.18);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:#C5A059;flex-shrink:0;border:1.5px solid rgba(197,160,89,.32)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:45;backdrop-filter:blur(3px);display:none}
#overlay.show{display:block}
#main{height:100vh;display:flex;flex-direction:column;overflow:hidden;
  transition:margin-left .32s cubic-bezier(.4,0,.2,1);margin-left:260px}
#main.collapsed{margin-left:72px}
#main.mobile{margin-left:0}
#topbar{
  flex-shrink:0;height:62px;background:var(--topbar-bg);
  backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);
  border-bottom:1px solid rgba(197,160,89,.11);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.65),0 8px 28px var(--shadow-color);
  display:flex;align-items:center;gap:14px;padding:0 24px;position:relative;z-index:30;
}
.tb-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(26,43,74,.06);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s ease,box-shadow .18s ease;color:var(--text-primary)}
.tb-btn:hover{background:rgba(26,43,74,.11);box-shadow:0 2px 8px rgba(26,43,74,.07)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1A2B4A,#0D1929);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  color:white;cursor:pointer;border:2px solid rgba(197,160,89,.32);box-shadow:0 2px 10px rgba(197,160,89,.14);
  transition:border-color .18s ease,box-shadow .18s ease;flex-shrink:0}
.user-avatar:hover{border-color:#C5A059;box-shadow:0 4px 16px rgba(197,160,89,.28)}
.fpill{padding:5px 14px;border-radius:9999px;font-size:12.5px;font-weight:500;
  border:1.5px solid var(--border-color);background:var(--surface-strong);color:var(--text-secondary);
  cursor:pointer;transition:all .18s ease;white-space:nowrap}
.fpill:hover{border-color:var(--deep-navy);color:var(--text-primary)}
.fpill.on{background:linear-gradient(135deg,#1A2B4A 0%,#243756 100%);border-color:#1A2B4A;color:white;
  box-shadow:0 2px 10px rgba(26,43,74,.22)}
.kpi-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:linear-gradient(148deg,rgba(197,160,89,.18) 0%,rgba(197,160,89,.06) 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.kpi-val{font-size:23px;font-weight:700;color:var(--text-primary);line-height:1}
.kpi-label{font-size:11.5px;color:var(--text-secondary);font-weight:500;margin-top:3px}
.scroll-y{overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:4px}
.scroll-y::-webkit-scrollbar-thumb{background:rgba(197,160,89,.2);border-radius:9999px}
#content{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s cubic-bezier(.25,.46,.45,.94) forwards}
.fu-1{animation-delay:.04s;opacity:0}.fu-2{animation-delay:.08s;opacity:0}
.fu-3{animation-delay:.12s;opacity:0}.fu-4{animation-delay:.16s;opacity:0}

/* Resource Matrix */
.matrix-row{display:grid;grid-template-columns:172px 1fr;gap:0;align-items:stretch;border-bottom:1px solid var(--border-color)}
.matrix-row:last-child{border-bottom:none}
.matrix-hall-label{padding:10px 12px;font-size:12.5px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px;border-right:1px solid var(--border-color)}
.matrix-track{position:relative;min-height:44px;display:grid}
.matrix-bar{position:relative;border-radius:7px;font-size:10.5px;font-weight:600;color:white;padding:4px 8px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;
  transition:transform .12s ease,box-shadow .12s ease;margin:4px 2px;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.matrix-bar:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 6px 16px rgba(0,0,0,.28);z-index:5}
.matrix-bar.vip{outline:2px solid #C5A059;outline-offset:-2px}
.matrix-grid-lines{position:absolute;inset:0;display:grid;pointer-events:none}
.matrix-grid-lines > div{border-right:1px solid var(--border-color)}
.legend-dot{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0}

/* Drawer */
.drawer-backdrop{position:fixed;inset:0;background:rgba(6,13,24,.45);backdrop-filter:blur(2px);z-index:90}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(440px,94vw);z-index:91;
  background:var(--surface-strong);box-shadow:-16px 0 48px rgba(0,0,0,.28);
  display:flex;flex-direction:column;transform:translateX(0);animation:slideIn .28s cubic-bezier(.25,.46,.45,.94)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-section{padding:14px 20px;border-bottom:1px solid var(--border-color)}
.drawer-section h4{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px;font-weight:700}
.drawer-row{display:flex;justify-content:space-between;gap:10px;padding:4px 0;font-size:13px;color:var(--text-primary)}
.drawer-row .k{color:var(--text-secondary)}
.qa-btn{padding:7px 12px;border-radius:9px;border:1.5px solid var(--border-color);background:var(--surface);
  font-size:12px;font-weight:600;color:var(--text-primary);cursor:pointer;transition:all .15s ease}
.qa-btn:hover{border-color:var(--gold);color:var(--gold)}
.qa-btn.danger:hover{border-color:#dc2626;color:#dc2626}

@media(max-width:900px){
  .matrix-row{grid-template-columns:96px 1fr}
  .split-view{grid-template-columns:1fr!important}
}
@media(max-width:768px){
  #main{margin-left:0!important}
  .hide-mobile{display:none!important}
  #content{padding:14px;gap:14px}
}
</style>

const fmtS = n => n>=10000000?'₹'+(n/10000000).toFixed(1)+'Cr':n>=100000?'₹'+(n/100000).toFixed(1)+'L':n>=1000?'₹'+(n/1000).toFixed(0)+'K':'₹'+(n||0);
const ini  = n => (n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
const toISO = d => { const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; };
/* event_date from the API is a UTC-midnight ISO string — slicing avoids the
   local-timezone rollback that new Date(...).getDate() would introduce. */
const dateOnly = d => typeof d==='string' ? d.slice(0,10) : toISO(d);
const addDays = (iso,n) => { const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return toISO(d); };
/* TIME columns come back as full ISO datetime strings (epoch-dated, UTC) or
   Date objects depending on the call path — normalize both to "HH:MM". */
const timeHM = t => {
  if (!t) return '';
  if (typeof t === 'string') {
    const isoMatch = t.match(/T(\d{2}):(\d{2})/);
    if (isoMatch) return `${isoMatch[1]}:${isoMatch[2]}`;
    return t.slice(0,5);
  }
  const d = new Date(t);
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
};
const hourOf = t => { const [h]=timeHM(t).split(':'); return parseInt(h,10)||0; };

const SIDEBAR_EXPANDED_KEY = 'bp_sidebar_expanded';
const loadSidebarExpanded = () => { try { return JSON.parse(sessionStorage.getItem(SIDEBAR_EXPANDED_KEY)) || {}; } catch { return {}; } };
const saveSidebarExpanded = (state) => { try { sessionStorage.setItem(SIDEBAR_EXPANDED_KEY, JSON.stringify(state)); } catch {} };
const isActiveNavHref = (href) => {
  try {
    const u = new URL(href, location.href);
    return u.pathname === location.pathname && u.search === location.search;
  } catch { return false; }
};

const Sidebar = ({ collapsed, onCollapse, isMobile, mobileOpen }) => {
  const user = (typeof Auth!=='undefined'?Auth.getUser():null)||{first_name:'Suresh',last_name:'Mehta',role_slug:'super_admin'};
  const name = `${user.first_name} ${user.last_name}`;
  const canSee = (perm) => !perm || (typeof Auth==='undefined') || Auth.hasPermission(perm);
  const [expandedMap, setExpandedMap] = useState(loadSidebarExpanded);
  // #sidebar.collapsed .sb-group-children{display:none} forces the children
  // hidden regardless of the expanded state while collapsed — toggling
  // expandedMap there was a silent no-op with no flyout to fall back on, so
  // a multi-item group's icon did nothing while collapsed (same bug fixed
  // in sidebar.js's toggleGroup for every other page). Navigate to the
  // group's first visible item instead when collapsed.
  const toggleGroup = (groupName, defaultOpen, firstItemHref) => {
    if (collapsed && !isMobile && firstItemHref) {
      window.location.href = firstItemHref;
      return;
    }

/* ── Resource Matrix (left) ── */
const mondayOf = (dateStr) => {
  const dt = new Date(dateStr+'T00:00:00');
  const shift = dt.getDay()===0 ? -6 : 1-dt.getDay();
  dt.setDate(dt.getDate()+shift);
  return dt.toISOString().slice(0,10);
};

const ResourceMatrix = ({ halls, bookings, granularity, setGranularity, anchorDate, setAnchorDate, onSelectBooking, onHoverBooking, onMoveBooking }) => {
  // Three distinct aggregation levels: hourly = single day / 24 hour columns,
  // daily = 7 individual day columns (unchanged), weekly = 6 week columns,
  // each aggregating every booking that falls in that Mon–Sun span rather
  // than rendering one bar per event (a week column is too narrow for that).
  const days = granularity==='hourly' ? [anchorDate]
    : granularity==='weekly' ? Array.from({length:6},(_,i)=>addDays(mondayOf(anchorDate),(i-2)*7))
    : Array.from({length:7},(_,i)=>addDays(anchorDate,i-3));
  const cols = granularity==='hourly' ? 24 : days.length;

  const barsForHall = (hallId) => {
    return bookings.filter(b => b.hall_id===hallId && b.status!=='cancelled' && b.status!=='draft');
  };

  // ── Drag-and-drop move/resize state ──────────────────────────────────────
  // `drag` = { booking, mode } where mode is 'move' (whole bar, any view) or
  // 'resize-start'/'resize-end' (hourly view only, dragging a bar's edge
  // handle to extend/shorten the event without changing its day/hall).
  const [drag, setDrag] = useState(null);
  const [dragOverKey, setDragOverKey] = useState(null); // "<hallId>:<col>" of the hovered drop target

  const startDrag = (b, mode) => (e) => {
    e.stopPropagation();
    setDrag({ booking: b, mode });
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', String(b.booking_id)); } catch {}
  };
  const endDrag = () => { setDrag(null); setDragOverKey(null); };

  const onDropTarget = (hallId, col) => (e) => {
    e.preventDefault();
    setDragOverKey(null);
    if (!drag) return;
    const { booking: b, mode } = drag;
    setDrag(null);

    if (granularity === 'hourly') {
      const origStart = hourOf(b.event_time_start);
      const origEnd    = Math.max(origStart+1, hourOf(b.event_time_end)||24);
      let newStartH = origStart, newEndH = origEnd, targetHallId = hallId;

      if (mode === 'resize-start') {
        newStartH = Math.max(0, Math.min(col, origEnd - 1));
        targetHallId = b.hall_id; // resizing never changes hall
      } else if (mode === 'resize-end') {
        newEndH = Math.max(origStart + 1, Math.min(24, col + 1));
        targetHallId = b.hall_id;
      } else {
        // Whole-bar move: col = target start hour, preserve original duration.
        const durationH = origEnd - origStart;
        newStartH = Math.max(0, Math.min(23, col));
        newEndH   = Math.min(24, newStartH + durationH);
      }

      onMoveBooking(b, {
        hallId: targetHallId, eventDate: b.event_date_iso,
        startTime: `${String(newStartH).padStart(2,'0')}:00`,
        endTime:   `${String(newEndH).padStart(2,'0')}:00`,
      });
    } else {
      const newDate = days[col];
      onMoveBooking(b, {
        hallId, eventDate: newDate,
        startTime: (b.event_time_start||'08:00').match(/\d{2}:\d{2}/)?.[0] || '08:00',
        endTime:   (b.event_time_end||'23:00').match(/\d{2}:\d{2}/)?.[0] || '23:00',
      });
    }
  };

  return (
    <Card hover style={{padding:0,overflow:'hidden'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border-color)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div>
          <h3 style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>Resource Matrix</h3>
          <p style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>Halls × timeline — spot free slots and conflicts at a glance</p>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <button className="fpill" onClick={()=>setAnchorDate(addDays(anchorDate,granularity==='hourly'?-1:granularity==='weekly'?-7*6:-7))}>‹</button>
          <input type="date" value={anchorDate} onChange={e=>setAnchorDate(e.target.value)} style={{fontSize:12,padding:'5px 8px',borderRadius:8,border:'1px solid var(--border-color)',background:'var(--surface)',color:'var(--text-primary)'}}/>
          <button className="fpill" onClick={()=>setAnchorDate(addDays(anchorDate,granularity==='hourly'?1:granularity==='weekly'?7*6:7))}>›</button>
          {['hourly','daily','weekly'].map(g=>(
            <button key={g} className={`fpill${granularity===g?' on':''}`} onClick={()=>setGranularity(g)} style={{textTransform:'capitalize'}}>{g}</button>
          ))}
        </div>
      </div>

      {/* Column headers */}
      <div className="matrix-row" style={{borderBottom:'2px solid var(--border-color)'}}>
        <div className="matrix-hall-label" style={{fontWeight:700,color:'var(--text-muted)',fontSize:10.5,textTransform:'uppercase'}}>Hall</div>
        <div style={{display:'grid',gridTemplateColumns:`repeat(${cols},1fr)`}}>
          {granularity==='hourly'
            ? Array.from({length:24},(_,h)=>(<div key={h} style={{fontSize:9.5,color:'var(--text-muted)',textAlign:'center',padding:'6px 0',borderRight:'1px solid var(--border-color)'}}>{h}:00</div>))
            : granularity==='weekly'
            ? days.map(d=>{ const isCur = d===mondayOf(anchorDate); const end = addDays(d,6); return (
                <div key={d} style={{fontSize:10,color:isCur?C.gold:'var(--text-muted)',fontWeight:isCur?700:500,textAlign:'center',padding:'6px 0',borderRight:'1px solid var(--border-color)'}}>
                  {new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}–{new Date(end+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
                </div>);})
            : days.map(d=>(<div key={d} style={{fontSize:10.5,color:d===anchorDate?C.gold:'var(--text-muted)',fontWeight:d===anchorDate?700:500,textAlign:'center',padding:'6px 0',borderRight:'1px solid var(--border-color)'}}>{new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric'})}</div>))
          }
        </div>
      </div>

      {/* Cap grows with the number of halls (each row is ~78px with the
          capacity/occupancy/status info) so a handful of halls shows fully
          without a scrollbar, while a large roster still caps out and
          scrolls rather than pushing the rest of the dashboard off-screen. */}
      <div className="scroll-y" style={{maxHeight:Math.min(640, Math.max(160, halls.length*78))}}>
        {halls.map(h=>{
          const hallBookings = barsForHall(h.hall_id);
          const seatedCap    = h.capacity_seated || h.capacity || 0;
          const anchorBookings = hallBookings.filter(b=>b.event_date_iso===anchorDate);
          const occupancy    = anchorBookings.reduce((s,b)=>s+(b.guest_count||0),0);
          const available    = Math.max(0, seatedCap - occupancy);
          const bookingStatus = h.is_under_maintenance ? 'Maintenance'
            : !h.is_active ? 'Inactive'
            : anchorBookings.length ? 'Booked' : 'Available';
          const statusColor = { Maintenance:C.red, Inactive:C.slate, Booked:C.amber, Available:C.green }[bookingStatus];
          return (
            <div className="matrix-row" key={h.hall_id}>
              <div className="matrix-hall-label" style={{flexDirection:'column',alignItems:'flex-start',gap:2,lineHeight:1.3}} title={h.hall_name}>
                <span style={{fontWeight:700}}>{h.hall_name}</span>
                <span style={{fontSize:9.5,color:'var(--text-muted)'}}>Seated {seatedCap} · Standing {h.capacity_standing||0}</span>
                <span style={{fontSize:9.5,color:'var(--text-muted)'}}>Occ {occupancy} · Free {available}</span>
                <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:9999,color:'white',background:statusColor}}>{bookingStatus}</span>
              </div>
              <div className="matrix-track" style={{gridTemplateColumns:`repeat(${cols},1fr)`,position:'relative'}}>
                <div className="matrix-grid-lines" style={{gridTemplateColumns:`repeat(${cols},1fr)`}}>
                  {Array.from({length:cols},(_,i)=><div key={i}/>)}
                </div>
                {/* Drop-zone layer — sits under the bars (rendered first) so a
                    drag can still be dropped on an occupied cell's uncovered
                    edges; the whole matrix relies on the server's own
                    availability/capacity re-check (reschedule()), so an
                    imprecise drop just surfaces that as a toast, never a
                    silent double-booking. */}
                {granularity!=='weekly' && Array.from({length:cols},(_,i)=>{
                  const key = `${h.hall_id}:${i}`;
                  return (
                    <div key={`dz${i}`}
                      style={{gridColumn:`${i+1} / ${i+2}`,alignSelf:'stretch',borderRadius:6,
                        background:dragOverKey===key?'rgba(124,58,237,.14)':'transparent',
                        outline:dragOverKey===key?'2px dashed var(--brand-primary)':'none', outlineOffset:-2}}
                      onDragOver={(e)=>{ e.preventDefault(); if (dragOverKey!==key) setDragOverKey(key); }}
                      onDragLeave={()=>{ if (dragOverKey===key) setDragOverKey(null); }}
                      onDrop={onDropTarget(h.hall_id, i)}
                    />
                  );
                })}
                {granularity==='hourly'
                  ? hallBookings.filter(b=>b.event_date_iso===anchorDate).map(b=>{
                      const startH = hourOf(b.event_time_start), endH = Math.max(startH+1, hourOf(b.event_time_end)||24);
                      // Setup/cleanup/cool-off buffers reserve the hall before/after the event itself —
                      // shown as a lighter extension of the same bar so conflicts during buffers are visible too.
                      const setupH   = (b.setup_minutes||0)/60;
                      const teardownH = ((b.cleanup_minutes||0)+(b.cooloff_minutes||0))/60;
                      const bufStart = Math.max(0, Math.floor(startH - setupH));
                      const bufEnd   = Math.min(24, Math.ceil(endH + teardownH));
                      return (
                        <React.Fragment key={b.booking_id}>
                          {setupH>0 && (
                            <div style={{gridColumn:`${bufStart+1} / ${startH+1}`,background:STATUS_COLOR[b.status]||C.slate,
                              opacity:.28,borderRadius:6,alignSelf:'center',height:14,pointerEvents:'none'}}
                              title={`Setup buffer for ${b.event_name||b.booking_ref}`}/>
                          )}
                          <div className={`matrix-bar${b.is_priority?' vip':''}`}
                            style={{gridColumn:`${startH+1} / ${endH+1}`,background:STATUS_COLOR[b.status]||C.slate,position:'relative',
                              opacity:drag?.booking?.booking_id===b.booking_id?0.4:1,cursor:'grab'}}
                            title={`${b.event_name||b.booking_ref} · ${b.customer_name} — drag to reschedule, or drag an edge to resize`}
                            draggable
                            onDragStart={startDrag(b,'move')} onDragEnd={endDrag}
                            onMouseEnter={()=>onHoverBooking(b)} onMouseLeave={()=>onHoverBooking(null)}
                            onClick={()=>onSelectBooking(b.booking_id)}>
                            <span draggable onDragStart={startDrag(b,'resize-start')} onDragEnd={endDrag} onClick={e=>e.stopPropagation()}
                              style={{position:'absolute',left:0,top:0,bottom:0,width:5,cursor:'ew-resize'}}/>
                            {b.event_name || b.booking_ref}
                            <span draggable onDragStart={startDrag(b,'resize-end')} onDragEnd={endDrag} onClick={e=>e.stopPropagation()}
                              style={{position:'absolute',right:0,top:0,bottom:0,width:5,cursor:'ew-resize'}}/>
                          </div>
                          {teardownH>0 && (
                            <div style={{gridColumn:`${endH+1} / ${bufEnd+1}`,background:STATUS_COLOR[b.status]||C.slate,
                              opacity:.28,borderRadius:6,alignSelf:'center',height:14,pointerEvents:'none'}}
                              title={`Cleanup/cool-off buffer for ${b.event_name||b.booking_ref}`}/>
                          )}
                        </React.Fragment>
                      );
                    })
                  : granularity==='weekly'
                  ? days.map((weekStart,i)=>{
                      const weekEnd = addDays(weekStart,6);
                      const weekBookings = hallBookings.filter(b=>b.event_date_iso>=weekStart && b.event_date_iso<=weekEnd);
                      if (!weekBookings.length) return <div key={weekStart} style={{gridColumn:`${i+1} / ${i+2}`,pointerEvents:'none'}}/>;
                      const guestTotal = weekBookings.reduce((s,b)=>s+(b.guest_count||0),0);
                      return (
                        <div key={weekStart} style={{gridColumn:`${i+1} / ${i+2}`,display:'flex',alignItems:'center',justifyContent:'center',padding:'6px 4px'}}
                          title={`${weekBookings.length} booking(s), ${guestTotal} guests — click to view that week in Daily view`}
                          onClick={()=>{ setAnchorDate(weekStart); setGranularity('daily'); }}>
                          <div style={{cursor:'pointer',borderRadius:9999,padding:'4px 12px',fontSize:11,fontWeight:700,color:'white',
                            background: weekBookings.some(b=>b.status==='cancelled') ? C.slate : STATUS_COLOR.confirmed}}>
                            {weekBookings.length} booking{weekBookings.length===1?'':'s'}
                          </div>
                        </div>
                      );
                    })
                  : days.map((d,i)=>{
                      const dayBookings = hallBookings.filter(b=>b.event_date_iso===d);
                      if (!dayBookings.length) return <div key={d} style={{gridColumn:`${i+1} / ${i+2}`,pointerEvents:'none'}}/>;
                      return (
                        <div key={d} style={{gridColumn:`${i+1} / ${i+2}`,display:'flex',flexDirection:'column',gap:2,padding:'3px 2px',pointerEvents:'none'}}>
                          {dayBookings.slice(0,2).map(b=>(
                            <div key={b.booking_id} className={`matrix-bar${b.is_priority?' vip':''}`}
                              style={{margin:0,background:STATUS_COLOR[b.status]||C.slate,pointerEvents:'auto',
                                opacity:drag?.booking?.booking_id===b.booking_id?0.4:1,cursor:'grab'}}
                              title={`${b.event_name||b.booking_ref} · ${b.customer_name} — drag to another day or hall`}
                              draggable
                              onDragStart={startDrag(b,'move')} onDragEnd={endDrag}
                              onMouseEnter={()=>onHoverBooking(b)} onMouseLeave={()=>onHoverBooking(null)}
                              onClick={()=>onSelectBooking(b.booking_id)}>
                              {b.event_name || b.booking_ref}
                            </div>
                          ))}
                          {dayBookings.length>2 && <div style={{fontSize:9.5,color:'var(--text-muted)',textAlign:'center'}}>+{dayBookings.length-2} more</div>}
                        </div>
                      );
                    })
                }
              </div>
            </div>
          );
        })}
        {!halls.length && <div style={{padding:24,fontSize:13,color:'var(--text-muted)'}}>No halls found.</div>}
      </div>

      <div style={{padding:'10px 18px',display:'flex',gap:16,flexWrap:'wrap',borderTop:'1px solid var(--border-color)'}}>
        {STATUS_LEGEND.map(l=>(
          <div key={l.label} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--text-secondary)'}}>
            <span className="legend-dot" style={{background:l.color}}/>{l.label}
          </div>
        ))}
      </div>
    </Card>
  );
};

/* ── Context Panel (right) — syncs with selected date / hovered / selected booking ── */

  const dayBookings = useMemo(()=>bookings.filter(b=>b.event_date_iso===anchorDate && b.status!=='cancelled'), [bookings,anchorDate]);
  const busyHalls = new Set(dayBookings.map(b=>b.hall_id));

  return (
    <Card hover style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:14}}>
      <div>
        <h3 style={{fontSize:14,fontWeight:700,color:'var(--text-primary)'}}>Daily Operational Snapshot</h3>
        <p style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{new Date(anchorDate+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div style={{textAlign:'center',padding:'10px 4px',background:'rgba(37,99,235,.07)',borderRadius:10}}>
          <div style={{fontSize:18,fontWeight:700,color:C.blue}}>{busyHalls.size}/{halls.length}</div>
          <div style={{fontSize:10,color:'var(--text-muted)'}}>Halls Busy</div>

        <div style={{textAlign:'center',padding:'10px 4px',background:'rgba(16,185,129,.08)',borderRadius:10}}>
          <div style={{fontSize:18,fontWeight:700,color:C.green}}>{dayBookings.length}</div>
          <div style={{fontSize:10,color:'var(--text-muted)'}}>Events Today</div>
        </div>
        <div style={{textAlign:'center',padding:'10px 4px',background:'rgba(197,160,89,.1)',borderRadius:10}}>
          <div style={{fontSize:18,fontWeight:700,color:C.gold}}>{fmtS(revenue)}</div>
          <div style={{fontSize:10,color:'var(--text-muted)'}}>Collected Today</div>
        </div>
        <div style={{textAlign:'center',padding:'10px 4px',background:'rgba(100,116,139,.1)',borderRadius:10}}>
          <div style={{fontSize:18,fontWeight:700,color:C.slate}}>{guestTotal}</div>
          <div style={{fontSize:10,color:'var(--text-muted)'}}>Total Guests</div>

          <div style={{fontSize:12,fontWeight:700,color:'var(--text-primary)',marginBottom:6}}>{hoveredBooking.event_name || hoveredBooking.booking_ref}</div>
          <div style={{fontSize:11.5,color:'var(--text-secondary)',lineHeight:1.6}}>
            {hoveredBooking.customer_name}<br/>
            {hoveredBooking.hall_name} · {timeHM(hoveredBooking.event_time_start)}–{timeHM(hoveredBooking.event_time_end)}<br/>
            {hoveredBooking.guest_count||0} guests · {STATUS_LABEL[hoveredBooking.status] || hoveredBooking.status}

      <div>
        <h4 style={{fontSize:11.5,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',marginBottom:8}}>Today's Bookings</h4>
        <div className="scroll-y" style={{maxHeight:240,display:'flex',flexDirection:'column',gap:6}}>
          {dayBookings.length ? dayBookings.map(b=>(
            <div key={b.booking_id} onClick={()=>onSelectBooking(b.booking_id)}
              style={{padding:'8px 10px',borderRadius:9,border:'1px solid var(--border-color)',cursor:'pointer',fontSize:12}}>
              <div style={{fontWeight:600,color:'var(--text-primary)'}}>{b.event_name||b.booking_ref}</div>
              <div style={{color:'var(--text-muted)',fontSize:11}}>{b.hall_name} · {timeHM(b.event_time_start)}</div>
            </div>
          )) : <div style={{fontSize:12,color:'var(--text-muted)'}}>No bookings for this date.</div>}
        </div>
      </div>
    </Card>
  );
};

const CommandCenterView = () => {
  const [halls, setHalls] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [inventorySnapshot, setInventorySnapshot] = useState([]);
  const [pendingTotal, setPendingTotal] = useState(0);
  const [cateringCount, setCateringCount] = useState(0);
  const [openLeadsCount, setOpenLeadsCount] = useState(0);
  const [customerCount, setCustomerCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [granularity, setGranularity] = useState('daily');
  const [anchorDate, setAnchorDate] = useState(toISO(new Date()));
  const [hoveredBooking, setHoveredBooking] = useState(null);
  const [drawerBookingId, setDrawerBookingId] = useState(null);

  const loadAll = useCallback(async () => {
    setLoading(true);
    const failed = [];
    const guard = (promise, label) => promise.catch(err => { failed.push(label); throw err; }).catch(() => null);
    try {
      const fromDate = addDays(anchorDate, -7);
      const toDate = addDays(anchorDate, 7);
      const [hallsRes, bookingsRes, invRes, pendingRes, cateringRes, leadsRes, customersRes] = await Promise.all([
        guard(API.halls.list({ limit:100 }), 'halls'),
        guard(API.bookings.list({ limit:300, from_date:fromDate, to_date:toDate }), 'bookings'),
        guard(API.resources.snapshot({ event_date:anchorDate }), 'inventory'),
        guard(API.payments.pending({ limit:200 }), 'pending payments'),
        guard(API.catering.packages(), 'catering packages'),
        guard(API.leads.list({}), 'leads'),
        guard(API.customers.list({ limit:1 }), 'customers'),
      ]);
      setHalls(hallsRes?.data?.halls || hallsRes?.data || []);
      const rows = (bookingsRes?.data?.bookings || []).map(b => ({ ...b, event_date_iso: dateOnly(b.event_date) }));
      setBookings(rows);
      setInventorySnapshot(Array.isArray(invRes?.data) ? invRes.data : []);
      setPendingTotal((pendingRes?.data?.pending || []).length);
      setCateringCount((cateringRes?.data?.packages || cateringRes?.data || []).length);
      const leadRows = leadsRes?.data?.leads || leadsRes?.data || [];
      setOpenLeadsCount(leadRows.filter(l => !['won','lost'].includes(l.stage)).length);
      setCustomerCount(customersRes?.data?.meta?.total || 0);
      if (failed.length) Utils.toast(`Failed to load: ${failed.join(', ')}`, 'warning');
    } catch (e) {
      Utils.toast(e.message || 'Failed to load Command Center data', 'error');
    } finally { setLoading(false); }
  }, [anchorDate]);

  useEffect(() => { loadAll(); }, [loadAll]);

  const kpis = useMemo(() => {
    const todayISO = toISO(new Date());
    const active = bookings.filter(b => b.event_date_iso===todayISO && b.status!=='cancelled');
    const busyHalls = new Set(active.map(b=>b.hall_id));
    const revenue = bookings.filter(b=>b.status!=='cancelled').reduce((s,b)=>s+(b.amount_paid||0),0);
    const occPct = halls.length ? Math.round((busyHalls.size/halls.length)*100) : 0;
    const shortageCount = inventorySnapshot.filter(r=>r.is_shortage).length;
    return { active: active.length, revenue, occPct, shortageCount, busyHalls: busyHalls.size };
  }, [bookings, halls, inventorySnapshot]);

  const [staffCount, setStaffCount] = useState(null);
  useEffect(() => {
    const todayISO = toISO(new Date());
    const activeIds = bookings.filter(b => b.event_date_iso===todayISO && b.status!=='cancelled').map(b=>b.booking_id);
    if (activeIds.length===0) { setStaffCount(0); return; }
    let dead = false;
    Promise.all(activeIds.map(id => API.bookings.staff(id).catch(()=>({data:[]}))))
      .then(results => {
        if (dead) return;
        setStaffCount(results.reduce((s,r)=>s+(Array.isArray(r.data)?r.data.length:0), 0));
      });
    return () => { dead = true; };
  }, [bookings]);

  const goOrToast = (href, label) => {
    if (href) { window.location.assign(href); return; }
    Utils.toast(`${label} module is coming soon`, 'info');
  };

  /* Drag-and-drop move/resize — the Resource Matrix is just another booking
     management surface, not a separate data source: every move goes through
     the same PATCH /bookings/:id/reschedule endpoint (now hall-move aware,
     see booking.repository.js) that bookings/detail.html's reschedule and the
     booking edit wizard already use, so hall/date-availability, capacity, and
     setup/cleanup/cool-off buffer validation are enforced exactly once,
     server-side. A successful move re-fetches via loadAll(), so
     Bookings/Customers/Payments/Dashboard/Reports/Occupancy/Revenue/Analytics
     all reflect it on their own next load (same table, no separate cache to
     invalidate beyond the dashboard KPI cache the service already clears). */
  const moveBooking = useCallback(async (booking, { hallId, eventDate, startTime, endTime }) => {
    try {
      const payload = { hallId, eventDate, eventTimeStart: startTime, eventTimeEnd: endTime };
      // Multi-day bookings: shift event_end_date by the same number of days
      // the start date moved, so a drag preserves the event's span length.
      if (booking.event_end_date) {
        const oldStart = new Date(booking.event_date_iso);
        const oldEnd   = new Date(dateOnly(booking.event_end_date));
        const spanDays = Math.round((oldEnd - oldStart) / 86400000);
        const newEnd = new Date(eventDate);
        newEnd.setDate(newEnd.getDate() + spanDays);
        payload.eventEndDate = toISO(newEnd);
      }
      await API.bookings.reschedule(booking.booking_id, payload);
      Utils.toast(`${booking.event_name || booking.booking_ref} moved`, 'success');
      await loadAll();
    } catch (err) {
      Utils.toast(err.message || 'Could not move this booking — the target slot may be unavailable', 'error');
    }
  }, [loadAll]);

  return (
    <>
      <div className="fu fu-1" style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:700,color:'var(--text-primary)'}}>Mission Control</h1>
          <p style={{fontSize:12.5,color:'var(--text-muted)',marginTop:2}}>Every card below is a shortcut — click through to the relevant module.</p>
        </div>
      </div>

      <div className="fu fu-2" style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
        <KPICard IconEl={()=>I.building({width:18,height:18})} color={C.blue}  label="Hall Occupancy" value={kpis.occPct+'%'} sub={`${kpis.busyHalls}/${halls.length} busy today`} onClick={()=>goOrToast('../reports/occupancy.html')}/>
        <KPICard IconEl={()=>I.dollarSign({width:18,height:18})} color={C.green} label="Revenue"        value={fmtS(kpis.revenue)}       sub="Collected, non-cancelled" onClick={()=>goOrToast('../reports/revenue.html')}/>
        <KPICard IconEl={()=>I.calendar({width:18,height:18})}  color={C.purple} label="Active Events"  value={kpis.active}              sub="Scheduled today" onClick={()=>goOrToast('../bookings/index.html')}/>
        <KPICard IconEl={()=>I.creditCard({width:18,height:18})} color={C.red}  label="Pending Payments" value={pendingTotal}            sub="Awaiting collection" onClick={()=>goOrToast('../payments/index.html')}/>
        <KPICard IconEl={()=>I.alertTriangle({width:18,height:18})} color={kpis.shortageCount?C.red:C.slate} label="Inventory Alerts" value={kpis.shortageCount} sub="Resources at 0 remaining" onClick={()=>goOrToast('../inventory/index.html')}/>
        <KPICard IconEl={()=>I.users({width:18,height:18})} color={C.teal} label="Staff Allocation" value={staffCount==null?'—':staffCount} sub={staffCount==null?'Loading…':`Assigned to today's ${kpis.active} event${kpis.active===1?'':'s'}`} onClick={()=>goOrToast('../staff/index.html')}/>
        <KPICard IconEl={()=>I.clipboardList({width:18,height:18})} color={C.amber} label="Catering" value={cateringCount} sub="Active packages" onClick={()=>goOrToast('../catering/menu.html')}/>
        <KPICard IconEl={()=>I.users({width:18,height:18})} color={C.purple} label="Total Customers" value={customerCount} sub="Manage customers" onClick={()=>goOrToast('../customers/index.html')}/>
        <KPICard IconEl={()=>I.trendingUp({width:18,height:18})} color={C.blue} label="Sales Pipeline" value={openLeadsCount} sub="Open leads & quotations" onClick={()=>goOrToast('../leads/index.html')}/>
        <KPICard IconEl={()=>I.home({width:18,height:18})} color={C.slate} label="Total Halls" value={halls.length} sub="Across all venues" onClick={()=>goOrToast('../halls/index.html')}/>
      </div>

      <div className="fu fu-3 split-view" style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:16,alignItems:'start'}}>
        <ResourceMatrix
          halls={halls} bookings={bookings}
          granularity={granularity} setGranularity={setGranularity}
          anchorDate={anchorDate} setAnchorDate={setAnchorDate}
          onSelectBooking={setDrawerBookingId}
          onHoverBooking={setHoveredBooking}
          onMoveBooking={moveBooking}
        />
        <ContextPanel
          anchorDate={anchorDate} bookings={bookings} halls={halls}
          hoveredBooking={hoveredBooking} onSelectBooking={setDrawerBookingId}
        />
      </div>

      {loading && <div style={{fontSize:12,color:'var(--text-muted)'}}>Refreshing live data…</div>}

      {drawerBookingId && (
        <QuickDrawer bookingId={drawerBookingId} onClose={()=>setDrawerBookingId(null)} onChanged={loadAll}/>
      )}
    </>
  );
};

/* This page renders its own sidebar/layout via React and never loads
   app.js/sidebar.js — app.js's initImpersonationBanner() (the sticky purple
   "Viewing as property: ..." bar every other page gets) never runs here.
   Portaled to document.body, fixed to the viewport top, so it sits above
   the whole app shell regardless of where in the DOM this renders. Same
   company_id -> color mapping as platform/tenants.html's tenantColor() and
   app.js's own copy, so a tenant reads as the same color everywhere. */
const TENANT_PALETTE = ['#2563EB', '#14B8A6', '#6366F1', '#F59E0B', '#10B981', '#EC4899', '#64748B', '#8B5CF6'];
const tenantColor = companyId => TENANT_PALETTE[Math.abs(companyId || 0) % TENANT_PALETTE.length];
const ImpersonationBanner = ({ state }) => ReactDOM.createPortal(
  <div style={{position:'fixed',top:0,left:0,right:0,zIndex:2000,background:'#7C3AED',color:'white',padding:'8px 16px',
    textAlign:'center',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:12}}>
    <span>Viewing as property:{' '}
      <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:tenantColor(state.companyId),margin:'0 5px 0 4px',verticalAlign:'middle'}}/>
      {state.companyName}
    </span>
    <button onClick={()=>{ API.Impersonation.clear(); window.location.href='../platform/tenants.html'; }}
      style={{background:'white',color:'#7C3AED',border:'none',borderRadius:6,padding:'3px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
      Exit
    </button>
  </div>,
  document.body
);

const App = () => {
  const [collapsed, setCollapsed] = useState(false);
  const [isMobile, setIsMobile] = useState(()=>window.innerWidth<768);
  const [mobOpen, setMobOpen] = useState(false);
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem('dashboard-dark-mode') === '1'; } catch { return false; }
  });

  useEffect(()=>{ if(typeof Auth!=='undefined'){ Auth.requireAuth(); Auth.applyTheme?.(); } },[]);

  useEffect(()=>{
    document.body.classList.toggle('dark-mode', darkMode);
    document.body.style.colorScheme = darkMode ? 'dark' : 'light';
    try { localStorage.setItem('dashboard-dark-mode', darkMode ? '1' : '0'); } catch (_) {}
  }, [darkMode]);

  useEffect(()=>{
    const h=()=>{ const mob=window.innerWidth<768; setIsMobile(mob); if(!mob) setMobOpen(false); };
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);

  useEffect(()=>{
    const sb=document.getElementById('sidebar');
    const main=document.getElementById('main');
    const ov=document.getElementById('overlay');
    if(!sb||!main||!ov) return;
    if(isMobile){ sb.className=mobOpen?'':'mobile-hidden'; main.className='mobile'; ov.className=mobOpen?'show':''; }
    else { sb.className=collapsed?'collapsed':''; main.className=collapsed?'collapsed':''; ov.className=''; }
  },[collapsed,isMobile,mobOpen]);

  window.__closeSidebar=()=>setMobOpen(false);
  function onMenu(){ isMobile?setMobOpen(o=>!o):setCollapsed(c=>!c); }

  const impersonationState = typeof API!=='undefined' && API.Impersonation ? API.Impersonation.get() : null;

  return (
    <>
      {impersonationState && <ImpersonationBanner state={impersonationState}/>}
      <Sidebar collapsed={collapsed} onCollapse={()=>setCollapsed(c=>!c)} isMobile={isMobile} mobileOpen={mobOpen}/>
      <div id="main">
        <Topbar onMenu={onMenu} darkMode={darkMode} setDarkMode={setDarkMode}/>
        <div id="content"><CommandCenterView/></div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
